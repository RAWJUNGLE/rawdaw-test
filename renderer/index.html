input,select{font-family:inherit;font-size:11px;color:var(--txt);background:#1f1f1f;
  border:1px solid var(--line2);border-radius:2px;outline:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:#141414}
::-webkit-scrollbar-thumb{background:#454545;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#565656}

/* ===== TRANSPORT ===== */
#transport{height:46px;min-height:46px;background:linear-gradient(#333,#2a2a2a);
  border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:0 10px;position:relative}
#transportLeft{position:absolute;left:10px;display:flex;align-items:center}
#logoBox{display:flex;align-items:center;gap:9px;padding:0 12px;margin-right:2px;
  border-right:1px solid var(--line2);height:34px;position:relative;cursor:pointer;
  border-radius:4px;transition:background .15s}
#logoBox:hover{background:rgba(255,255,255,.08)}
#logoBox:active{background:rgba(255,255,255,.12)}
#logoBox svg{width:30px;height:28px;display:block;pointer-events:none}
#logoBox svg path{fill:var(--accent)}
#logoText{font-weight:800;letter-spacing:2px;font-size:16px;color:#eee;pointer-events:none}
#logoText b{color:var(--accent)}
#logoArrow{font-size:16px;color:#888;margin-left:0;pointer-events:none}
#transportCenter{display:flex;align-items:center}
#fileMenu{position:absolute;top:100%;left:0;min-width:170px;background:#222;border:1px solid var(--line2);
  border-radius:4px;padding:4px 0;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.5);
  max-height:320px;overflow-y:auto}
#fileMenu.show{display:block}
#fileMenu button{display:block;width:100%;background:none;border:none;color:#ccc;font-size:12px;
  text-align:left;padding:6px 14px;cursor:pointer}
#fileMenu button:hover{background:var(--accent);color:#111}
#fileMenu .sep{height:1px;background:var(--line2);margin:4px 8px}
.t-grp{display:flex;align-items:center;gap:5px;padding:0 8px;border-right:1px solid var(--line2);height:34px}
.t-grp:last-child{border-right:none}
.tbtn{width:30px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px}
.tbtn.play.on{background:var(--play);color:#063;border-color:var(--play)}
.tbtn.rec.on{background:var(--rec);border-color:var(--rec);color:#fff}
.tbtn.metro.on{background:var(--accent);border-color:var(--accent);color:#111}
.tbtn.loop.on{background:#5a86c4;border-color:#5a86c4;color:#fff}
#bpmBox{display:flex;align-items:center;gap:4px;cursor:ns-resize;user-select:none}
#bpmDisplay{width:52px;height:22px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  background:#111;border:1px solid var(--line2);border-radius:3px;transition:border-color .15s}
#bpmDisplay:hover{border-color:var(--txt-dim)}
#position{font-family:"Consolas",monospace;font-size:17px;font-weight:700;background:#111;
  border:1px solid var(--line2);border-radius:3px;padding:3px 9px;min-width:96px;text-align:center;
  color:#cfe6ff;letter-spacing:1px}
label.lbl{font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px}
select.qsel{height:24px;padding:0 4px}

/* ===== LAYOUT ===== */
#main{flex:1;display:flex;min-height:0}
#browser{width:206px;min-width:100px;max-width:500px;background:var(--browser);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:relative}
#browserResize{position:absolute;right:-3px;top:0;bottom:0;width:6px;cursor:col-resize;z-index:10}
#arrOuter{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
#arrCanvasWrap{flex:1;overflow:auto;position:relative;background:#1e1e1e;min-width:0;min-height:0}
#arrSpacer{width:1px;height:1px}
#loopOv{position:absolute;top:0;left:0;right:0;height:16px;z-index:3;touch-action:none}
#rulerOv{position:absolute;top:16px;left:0;right:0;height:26px;z-index:2;cursor:zoom-in;touch-action:none}
#arrCanvas{display:block;position:absolute;top:0;left:0;z-index:1;will-change:transform}
#timeRuler{display:block;width:100%;height:28px;background:#1e1e1e;flex-shrink:0;border-top:2px solid #444;cursor:zoom-in}
#right{width:220px;min-width:220px;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column}

/* ===== BROWSER ===== */
#bSearch{padding:5px 7px;flex-shrink:0}
#bSearch input{width:100%;height:22px;padding:0 6px}
.bSection{flex:1;display:flex;flex-direction:column;min-height:0;border-top:1px solid var(--line)}
.bSection.collapsed{flex:none}
.bSecHead{display:flex;align-items:center;padding:4px 7px;cursor:pointer;user-select:none;flex-shrink:0}
.bSecHead span{flex:1;font-size:10px;font-weight:700;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px}
.bCollapse{width:16px;height:16px;border-radius:3px;padding:0;font-size:12px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bSecBody{flex:1;overflow-y:auto;min-height:0}
.bSection.collapsed .bSecBody{display:none}
.bSection.collapsed #loadSamplesBtn{display:none}
.bItem{display:flex;align-items:center;gap:8px;padding:5px 9px;cursor:grab;border-bottom:1px solid #202020}
.bItem:hover{background:#303030}
.bItem.sel{background:#3a3a3a;outline:1px solid var(--accent)}
.bItem .ic{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;color:#111}
.bItem .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.bItem .meta{font-size:9px;color:var(--txt-dim)}
.bItem .bDel{display:none;width:14px;height:14px;border-radius:2px;background:#2a2a2a;border:1px solid #4a4a4a;align-items:center;justify-content:center;font-size:8px;color:#888;cursor:pointer;flex-shrink:0;user-select:none}
.bItem:hover .bDel{display:flex}
.bItem .bDel:hover{background:#e84118;border-color:#e84118;color:#fff}
#loadSamplesBtn{margin:5px 7px;width:calc(100% - 14px);height:24px;flex-shrink:0}
.modTag{display:inline-flex;align-items:center;gap:3px;font-size:8px;background:var(--panel);border:1px solid var(--line2);border-radius:3px;padding:1px 4px;cursor:pointer}
.modTag:hover{border-color:var(--accent)}
.modTag .del{color:#e84118;cursor:pointer;font-weight:700;line-height:1}
.modKnob{position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:1px}
.modKnob .dial{width:24px;height:24px;border-radius:50%;background:#222;border:1px solid var(--line2);position:relative;cursor:ns-resize}
.modKnob .dial .ind{position:absolute;width:2px;height:10px;background:#8b5cf6;left:50%;top:3px;transform-origin:50% 100%;transform:translateX(-50%) rotate(-135deg);border-radius:1px}
.modKnob .kl{font-size:7px;color:var(--txt-dim);text-transform:uppercase}
.modKnob .kv{font-size:8px;color:var(--txt)}
.modOv{position:absolute;inset:0;border-radius:50%;background:rgba(76,209,55,0.25);pointer-events:none;z-index:3;border:1px solid rgba(76,209,55,0.5);transition:opacity .15s}
.dial.mapHL{box-shadow:0 0 0 2px rgba(76,209,55,.55),0 0 8px rgba(76,209,55,.35);cursor:copy}
.modLabel{font-size:7px;color:var(--txt-dim);text-align:center;padding:1px 3px;background:#1f1f1f;border:1px solid var(--line2);border-radius:2px;cursor:pointer;white-space:nowrap}
.modLabel.on{background:rgba(76,209,55,0.2);border-color:var(--play);color:#8f8}
.modWaveCv{width:100%;height:60px;border-radius:4px;border:1px solid var(--line2);display:block;cursor:crosshair}

/* ===== RIGHT (tracks + mixer) ===== */
#rightHead{height:24px;display:flex;align-items:center;justify-content:space-between;padding:0 8px;
  border-bottom:1px solid var(--line);background:#262626}
#rightHead b{color:var(--accent);letter-spacing:1px;font-size:11px}
#addTrack{height:18px;padding:0 8px;font-size:10px}
#stripsWrap{flex:1;overflow:hidden;position:relative}
#strips{position:absolute;left:0;right:0;top:0}
.strip-wrap{display:flex;flex-direction:column}
.drag-handle{cursor:grab;color:var(--txt-dim);font-size:13px;line-height:1;padding:0 2px;flex-shrink:0;user-select:none;transition:color .15s;width:12px;text-align:center;letter-spacing:-2px}
.drag-handle:hover{color:var(--accent)}
.strip-wrap:has(.drag-handle:active){cursor:grabbing}
.strip{height:100px;padding:4px 7px;border-bottom:1px solid var(--line);display:flex;
  flex-direction:column;gap:3px;cursor:pointer}
.svBtn{width:16px;height:14px;border-radius:2px;font-size:9px;padding:0;line-height:14px;cursor:pointer;flex-shrink:0}
.svBtn:hover{background:var(--line)}
.svText{font-size:7px;color:var(--txt-dim);overflow:hidden;white-space:nowrap;flex:1;text-overflow:ellipsis;line-height:1.2}
.strip.sel{box-shadow:inset 3px 0 0 var(--accent);background:#3c3c3c}
.strip .r1{display:flex;align-items:center;gap:5px}
.strip .cdot{width:10px;height:10px;border-radius:3px;flex-shrink:0;cursor:pointer}
.strip .nm{flex:1;background:transparent;border:none;color:#fff;font-weight:600;font-size:11px;padding:1px 2px;
  overflow:hidden;text-overflow:ellipsis}
.msBtn{height:16px;width:18px;border-radius:2px;font-size:9px;font-weight:700;padding:0;cursor:pointer}
.msBtn.m.on{background:var(--mute);color:#111;border-color:var(--mute)}
.msBtn.s.on{background:var(--solo);color:#fff;border-color:var(--solo)}
.armBtn{width:16px;height:16px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
.armBtn.on{background:var(--rec);border-color:var(--rec)}
.armBtn i{width:7px;height:7px;border-radius:50%;background:#777;display:block}
.armBtn.on i{background:#fff}
/* horizontal slider (vol, pan, master) */
.hsl{height:14px;position:relative;background:#1a1a1a;border-radius:3px;cursor:ew-resize}
.hsl .fill{position:absolute;left:0;top:0;bottom:0;background:#6b7785;border-radius:3px 0 0 3px}
.hsl .knob{position:absolute;top:1px;width:6px;height:12px;background:#cfcfcf;border-radius:2px}
.strip .r2{display:flex;align-items:center;gap:6px;flex:1;min-height:0}
.hsl.vol{flex:1}
#masterFader{flex:1}
.strip .r3{display:flex;align-items:center;gap:6px;height:18px}
.hsl.pan{flex:1}
.vvu{width:4px;align-self:stretch;min-width:4px;position:relative;background:#141414;border-radius:2px;overflow:hidden}
.vvu i{position:absolute;bottom:0;left:0;right:0;width:100%;background:var(--vu-g)}
.dbVal{font-size:8px;color:var(--txt-dim);text-align:right;flex-shrink:0}

#masterStrip{border-top:2px solid var(--line2);background:#262626;height:66px;padding:6px 7px;
  display:flex;flex-direction:column;gap:4px;cursor:pointer}
#masterStrip.sel{background:#3c3c3c;box-shadow:inset 3px 0 0 var(--accent)}
#masterStrip .r1{display:flex;align-items:center;gap:6px}
#masterStrip .r1 b{flex:1;color:#bbb;letter-spacing:1px}
.dropHi{outline:2px dashed var(--accent)!important;outline-offset:-2px;background:#352a22}

/* ===== track activator + automation selectors ===== */
.actBtn{width:14px;height:14px;border-radius:3px;font-size:8px;line-height:1;padding:0;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#8a8a8a}
.actBtn.on{background:var(--play);border-color:var(--play);color:#063}
.strip.off{opacity:.5;filter:grayscale(.65)}
.strip.off .nm{color:#9a9a9a}
.strip .r4{display:flex;flex-direction:column;gap:3px;padding:2px 0;min-height:18px}
.autoSel{flex:1;min-width:0;height:18px;padding:0 3px;font-size:9px;background:#1f1f1f;
  border:1px solid var(--line2);border-radius:2px;color:#cfcfcf}
.autoSel.dev{color:#9ad0ff;border-color:#39506a}
/* #autoMode removed — automation lanes are always editable */
.autoDot{width:6px;height:6px;border-radius:50%;background:var(--rec);flex-shrink:0;box-shadow:0 0 4px var(--rec)}
.autoInd{width:6px;height:6px;border-radius:50%;background:var(--rec);flex-shrink:0;display:inline-block;vertical-align:middle;margin:0 2px;box-shadow:0 0 4px var(--rec)}
.knob{position:relative}
.knob .autoDot{position:absolute;top:-2px;right:-2px;z-index:5}

/* ===== BOTTOM (device chain / clip editor) ===== */
#bottom{height:248px;min-height:80px;background:var(--panel);border-top:1px solid var(--line);
  display:flex;flex-direction:column;position:relative}
#bottomResize{position:absolute;top:-3px;left:0;right:0;height:6px;cursor:row-resize;z-index:10}
#bottomTabs{height:26px;min-height:26px;display:flex;align-items:center;gap:6px;padding:0 8px;
  border-bottom:1px solid var(--line);background:#262626}
#bottomTitle{font-weight:700;color:var(--accent);letter-spacing:.5px;margin-right:auto}
.btab{height:20px;padding:0 8px;font-size:10px;font-weight:600;border-radius:3px;background:transparent;border:1px solid transparent;color:var(--txt-dim);cursor:pointer}
.btab:hover{color:var(--txt);background:rgba(255,255,255,.06)}
.btab.on{color:var(--txt);background:var(--panel);border-color:var(--line2)}
#bottomBody{flex:1;overflow:hidden;position:relative}
.editorPane{display:none;width:100%;height:100%}
.editorPane.on{display:block}
.devChain{display:flex;gap:8px;padding:8px;height:calc(100% - 16px);overflow-x:auto;overflow-y:hidden;align-items:stretch}
.devCard{background:#262626;border:1px solid var(--line2);border-radius:5px;padding:6px 8px;
  display:flex;flex-direction:column;gap:6px;min-width:130px;max-width:260px;flex-shrink:0;cursor:pointer}
.devCard .hd{display:flex;align-items:center;gap:6px;border-bottom:1px solid #383838;padding-bottom:4px}
.devCard .hd .devDrag{cursor:grab;font-size:12px;color:var(--txt-dim);flex-shrink:0;padding:0 2px;user-select:none;-webkit-user-select:none}
.devCard .hd .devDrag:hover{color:var(--accent)}
.devCard .hd b{flex:1;font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.devCard .hd .pwr{width:16px;height:16px;border-radius:3px;font-size:9px;padding:0;flex-shrink:0}
.devCard .hd .pwr.on{background:var(--accent);color:#111;border-color:var(--accent)}
.devCard.sel{border-color:var(--accent);box-shadow:0 0 6px rgba(100,200,255,.3)}
.devCard.collapsed,.devCard.collapsed:has(.eqxWrap),.devCard.collapsed:has(.irWaveformWrap){min-width:36px;max-width:36px;width:36px;padding:6px 4px;cursor:pointer;overflow:hidden}
.devCard.collapsed .hd{flex-direction:column;border-bottom:none;padding-bottom:0;gap:0;align-items:center;flex:1;position:relative;justify-content:space-between}
.devCard.collapsed .hd .devDrag{font-size:13px;writing-mode:horizontal-tb;padding:2px 0}
.devCard.collapsed .hd b{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(90deg);white-space:nowrap;font-size:9px;letter-spacing:2px;flex:none;margin:0;min-height:0;line-height:1;overflow:visible;text-overflow:clip}
.devCard.collapsed .hd .pwr{writing-mode:horizontal-tb;margin:2px 0;margin-top:auto}
.devCard.collapsed>div:last-child{display:none!important}
.knobRow{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}
.irLabel{font-size:9px;color:var(--txt-dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.irBtn{font-size:9px;padding:2px 8px;background:#2a2a2a;color:#ccc;border:1px solid #444;border-radius:3px;cursor:pointer}
.irBtn:hover{background:#3a3a3a;color:#fff}
.knob{display:flex;flex-direction:column;align-items:center;gap:1px;width:38px;flex-shrink:0}
.knob .dial{width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#4a4a4a,#222);border:1px solid #111;position:relative;cursor:ns-resize}
.knob .dial::after{content:"";position:absolute;inset:0;border-radius:50%;
  box-shadow:inset 0 1px 2px rgba(255,255,255,.12),inset 0 -2px 3px rgba(0,0,0,.5)}
.knob .kl{font-size:8px;color:var(--txt-dim);text-align:center;line-height:1.1}
.knob .kv{font-size:8px;color:#ccc;cursor:text}
.selrow{display:flex;flex-direction:column;gap:3px;font-size:9px;width:84px;flex-shrink:0}
.selrow select{height:20px;width:100%;box-sizing:border-box}
.devEmpty{padding:24px;color:var(--txt-dim);text-align:center;width:100%}
.eqCanvasWrap{position:relative}
/* ===== EQ EIGHT (FreeEQ8 port) ===== */
.devCard:has(.eqxWrap){min-width:584px;max-width:584px}
.eqxWrap{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0;width:560px;max-width:100%}
.eqxCv{position:relative;flex:1;min-height:54px;background:linear-gradient(180deg,#13161a,#0c0e11);border:1px solid #2c3138;border-radius:5px;overflow:hidden}
.eqxCv canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;display:block}
.eqxChips{display:flex;gap:4px;align-items:center;flex-shrink:0}
.eqxChip{width:24px;height:15px;border-radius:3px;border:1px solid #3a3f46;background:#23262b;color:#777;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;line-height:1;transition:background .12s,color .12s}
.eqxHint{margin-left:auto;font-size:8px;color:#555;letter-spacing:.3px}
.eqxRow{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap;flex-shrink:0}
.eqxRow .knob{width:34px}
.eqxRow .knob .dial{width:24px;height:24px}
.eqxSelCol{display:flex;flex-direction:column;gap:1px;width:62px;flex-shrink:0}
.eqxSelCol .kl{font-size:8px;color:var(--txt-dim);text-align:center;line-height:1.1}
.eqxSelCol select{height:18px;font-size:9px;width:100%;box-sizing:border-box}
.cdWrap{position:relative;display:flex;flex-direction:column;gap:1px;width:62px;flex-shrink:0}
.cdBtn{height:18px;font-size:9px;text-align:left;background:#1f1f1f;border:1px solid var(--line2);border-radius:2px;color:#cfcfcf;cursor:pointer;padding:0 4px;display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cdBtn::after{content:"▾";margin-left:auto;font-size:7px;color:#888;flex-shrink:0}
.cdList{position:absolute;top:100%;left:0;min-width:100%;background:#2a2d30;border:1px solid #3a3d40;border-radius:3px;z-index:200;display:none;max-height:260px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.5);white-space:nowrap}
.cdItem{padding:4px 8px;font-size:9px;cursor:pointer;color:#cfcfcf}
.cdItem.hov{background:#3d3d3d}
.cdItem.on{color:var(--accent);font-weight:700}
.eqxBtn{height:18px;padding:0 8px;font-size:9px;font-weight:700;border-radius:3px;border:1px solid #3a3f46;background:#23262b;color:#99a;cursor:pointer;align-self:flex-end;margin-bottom:13px}
.eqxBtn.on{background:var(--accent);border-color:var(--accent);color:#10131a}
/* ===== HYBRID REVERB IR WAVEFORM ===== */
.devCard:has(.irWaveformWrap){min-width:584px;max-width:584px}
.irWaveformWrap{display:flex;flex-direction:column;gap:5px;flex:1 1 auto;min-width:0;width:560px;max-width:100%;min-height:0}
.irWaveformCv{position:relative;flex:1 1 auto;min-height:120px;border-radius:5px;overflow:hidden;background:#13151a}
.irWaveformCv canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.eqxDiv{width:1px;align-self:stretch;background:#33383f;margin:0 3px}
#peTop,.peTop{height:30px;display:flex;align-items:center;gap:10px;padding:0 10px;
  border-bottom:1px solid var(--line);background:#262626;flex-wrap:wrap}
.peTop .mini{font-size:9px;color:var(--txt-dim)}
.peTop input[type=range]{width:120px}

/* ===== CLIP EDITOR (sample) ===== */
.ceRoot{display:flex;height:100%;min-height:0}
#ceLeft{width:200px;min-width:200px;background:#262626;border-right:1px solid var(--line);
  padding:6px 8px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
#ceLeft .ceSep{height:1px;background:var(--line2);flex-shrink:0;margin:2px 0}
#ceLeft .ceBtns{display:flex;gap:4px;flex-shrink:0}
#ceLeft .ceBtns button{flex:1;height:24px;font-size:11px;padding:0;border-radius:3px;border:1px solid #3a3a3a;background:#1a1a1a;color:#999;cursor:pointer}
#ceLeft .ceBtns button:hover{background:#2a2a2a;color:#ccc}
#ceLeft .ceBtns #ceRev{font-size:15px;line-height:1}
.ceToggle.on{background:var(--accent);color:#111;border-color:var(--accent)}
.ceCtl{display:flex;gap:8px;align-items:flex-end;padding:2px 0}
.ceGrp{display:flex;flex-direction:column;align-items:center;gap:2px}
.ceGrp .lbl2{font-size:8px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px}

#ceStretchOpts .cdBtn{width:100%;height:20px;font-size:9px;padding:0 8px}
#ceLeft .loopStack{display:flex;flex-direction:row;gap:6px;flex-shrink:0}
#ceLeft .loopStack .ceGrp{gap:1px;flex:1;min-width:0}
#ceLeft .loopStack .ceGrp .lbl2{font-size:8px}

#ceLeft .bpmRow{display:flex;flex-direction:row;align-items:center;gap:0;flex-shrink:0;width:100%}

#ceLeft .bpmRow #ceBpmV:hover{border-color:var(--txt-dim)}
#ceLeft .bpmRow .bpmRight{display:flex;gap:4px;margin-left:auto}
#ceLeft .bpmRow .bpmRight .ceToggle{height:24px;font-size:11px;min-width:36px;padding:0 8px;border-radius:3px;border:1px solid #3a3a3a;background:#1a1a1a;color:#999;cursor:pointer}
#ceLeft .bpmRow .bpmRight .ceToggle:hover{background:#2a2a2a;color:#ccc}
#ceLeft .bpmRow .bpmRight .ceToggle.on{background:var(--accent);color:#111;border-color:var(--accent)}
#ceLeft .knobRow{display:flex;gap:8px;align-items:flex-end;justify-content:center;flex-shrink:0;padding:2px 0}

<script>
/* =======================================================================
   RAWDAW v2 — arrangement-only DAW with device chains
   ======================================================================= */
'use strict';
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const dbToGain=db=>db<=-60?0:Math.pow(10,db/20);
const gainToDb=g=>g<=0.0001?-Infinity:20*Math.log10(g);
const fmtDb=g=>{const d=gainToDb(g);return d===-Infinity?'-inf':(d>0?'+':'')+d.toFixed(1);};
const uid=()=>Math.random().toString(36).slice(2,9);
const TRACK_COLORS=['#ff5e5e','#ff9f43','#ffd23f','#a3e635','#3fd35a','#34d6c1',
  '#3aa1ff','#5a86c4','#8b5cf6','#c264e8','#ff6fd3','#ff8fa3','#c0a080','#9aa0a6','#6fd3ff','#e0e0e0'];
function toast(m){const t=$('#toast');if(!t)return;t.textContent=m;t.classList.add('on');
  clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('on'),3000);}
window.onerror=(msg,url,line,col,err)=>toast('ERR: '+(err?.stack||msg));
window.onunhandledrejection=e=>{toast('REJ: '+(e.reason?.stack||e.reason));console.error('[unhandled]',e.reason);};

function makeImpulse(ctx,decay){const rate=ctx.sampleRate,len=Math.max(0.1,decay)*rate;
  const buf=ctx.createBuffer(2,len,rate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.6);}return buf;}

/* =======================================================================
   AUDIO ENGINE
   ======================================================================= */
class AudioEngine{
  constructor(){this.ctx=null;this.bpm=120;this.state='STOPPED';this.metroOn=false;
    this.lookahead=0.12;this.startTime=0;this.startBeat=0;this._cursor=0;this.loopOn=false;this.loopStart=0;this.loopEnd=4;
    this.tracks=[];this._schedTimer=null;this._lastMetroBeat=-1;}
  init(){if(this.ctx)return;
    this.ctx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    const c=this.ctx;
    this.master=c.createGain();this.master.gain.value=1;
    this.masterInput=c.createGain();this.masterInput.connect(this.master);
    this.masterAnalyser=c.createAnalyser();this.masterAnalyser.fftSize=1024;
    this.master.connect(this.masterAnalyser).connect(c.destination);
    eqxEnsureWorklet(c).catch(err=>console.warn('[EQ8] worklet preload failed — fallback DSP will be used:',err&&err.message||err));
    initStretch();
    // return A reverb, B delay (global sends still available to devices? kept minimal)
    this.returnA=c.createGain();this.revA=c.createConvolver();this.revA.buffer=makeImpulse(c,2.4);
    this.revAWet=c.createGain();this.revAWet.gain.value=0.9;
    this.returnA.connect(this.revA).connect(this.revAWet).connect(this.master);
    this.returnB=c.createGain();this.dlB=c.createDelay(2);this.dlB.delayTime.value=60/this.bpm*0.75;
    this.dlBfb=c.createGain();this.dlBfb.gain.value=0.4;this.dlBWet=c.createGain();this.dlBWet.gain.value=0.9;
    this.returnB.connect(this.dlB);this.dlB.connect(this.dlBfb).connect(this.dlB);
    this.dlB.connect(this.dlBWet).connect(this.master);
  }
  resume(){if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();}
  get secPerBeat(){return 60/this.bpm;}
  nowBeat(){if(this.state==='STOPPED')return this._cursor;
    return this.startBeat+(this.ctx.currentTime-this.startTime)/this.secPerBeat;}
  beatToTime(beat){return this.startTime+(beat-this.startBeat)*this.secPerBeat;}
  setBpm(v){this.bpm=clamp(parseFloat(v.toFixed(2)),20,999);if(this.ctx)this.dlB.delayTime.setTargetAtTime(60/this.bpm*0.75,this.ctx.currentTime,0.05);}
  play(record=false){this.init();this.resume();if(this.state!=='STOPPED')return;
    this.state=record?'RECORDING':'PLAYING';
    if(this.loopOn&&this.loopEnd>this.loopStart)this._cursor=Math.max(this.loopStart,Math.min(this._cursor,this.loopEnd-0.0001));
    this.startTime=this.ctx.currentTime+0.06;this.startBeat=this._cursor;
    this._scheduledUntil=this.startBeat;this._winStart=this.startBeat;this._firstWindow=true;
    this._lastMetroBeat=Math.floor(this.startBeat)-1;
    this.tracks.forEach(t=>t.prepareForPlay());
    if(typeof snapshotManual==='function')snapshotManual();
    this._schedTimer=setInterval(()=>this._scheduler(),25);this._scheduler();}
  jumpTo(beat){this._cursor=beat;
    if(this.state!=='STOPPED'){this.tracks.forEach(t=>t.stopAll());
      this.startBeat=beat;this.startTime=this.ctx.currentTime+0.02;
      this._scheduledUntil=beat;this._winStart=beat;this._firstWindow=true;
      this._lastMetroBeat=Math.floor(beat)-1;}}
  stop(){if(this.state==='STOPPED'){return;}
    this._cursor=this.nowBeat();this.state='STOPPED';clearInterval(this._schedTimer);this._schedTimer=null;
    this.tracks.forEach(t=>t.stopAll());
    if(typeof restoreManualState==='function')restoreManualState();}
  scheduleEvent(t,cb){const lead=(t-this.ctx.currentTime)*1000;if(lead<=0){cb();return;}setTimeout(cb,Math.max(0,lead-5));}
  _scheduler(){if(this.state==='STOPPED')return;
    if(this.loopOn&&this.loopEnd>this.loopStart){const now=this.nowBeat();
      if(now>=this.loopEnd){const wrap=now-this.loopEnd;
        this.startTime=this.ctx.currentTime+0.02;
        this.startBeat=this.loopStart+wrap%(this.loopEnd-this.loopStart);
        this._scheduledUntil=this.startBeat;this._winStart=this.startBeat;this._firstWindow=true;
        this._lastMetroBeat=Math.floor(this.startBeat)-1;
        this.tracks.forEach(t=>t.stopAll(this.startTime));}}
    const ahead=this.nowBeat()+this.lookahead/this.secPerBeat;
    while(this._scheduledUntil<ahead){const beat=this._scheduledUntil;
      if(this.metroOn&&Math.floor(beat)>this._lastMetroBeat){this._lastMetroBeat=Math.floor(beat);
        this._metroClick(this.beatToTime(this._lastMetroBeat),this._lastMetroBeat%4===0);}
      this._scheduledUntil+=0.0625;}
    const ws=this._winStart;
    this.tracks.forEach(t=>t.scheduleArr(ws,ahead,this._firstWindow,this.startBeat));
    this._winStart=ahead;this._firstWindow=false;}
  _metroClick(time,accent){const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.frequency.value=accent?1600:1000;o.type='square';
    g.gain.setValueAtTime(0.0001,time);g.gain.exponentialRampToValueAtTime(accent?0.5:0.3,time+0.001);
    g.gain.exponentialRampToValueAtTime(0.0001,time+0.05);
    o.connect(g).connect(this.master);o.start(time);o.stop(time+0.06);}
  anySolo(){return this.tracks.some(t=>t.solo);}
  updateMuteStates(){this.tracks.forEach(t=>t.applyGain());}
}
const engine=new AudioEngine();

/* =======================================================================
   DEVICES (audio effects inserted into a track chain)
   ======================================================================= */
class Device{
  constructor(ctx){this.ctx=ctx;this.id=uid();this.enabled=true;this._collapsed=false;
    this.input=ctx.createGain();this.output=ctx.createGain();
    this.scInput=ctx.createGain();this.scInput.gain.value=0;
    this.params={};}
  setEnabled(on){this.enabled=on;}      // bypass handled by rebuildChain
  applyParams(){}
  buildUI(card){}
  tick(){}
  dispose(){try{this.input.disconnect();this.output.disconnect();this.scInput.disconnect();}catch(e){}}
}

/* ---- EQ EIGHT — FreeEQ8 DSP port (GPL-3.0, github.com/GareBear99/FreeEQ8) ----
   DSP core: Andrew Simper (Cytomic) trapezoidal SVF filters, 20ms parameter
   smoothing, 12/24/48 dB/oct cascades, per-band drive (4 saturation modes),
   per-band dynamic EQ with band-tracking sidechain, Mid/Side processing.
   The DSP runs in an AudioWorklet; if the module can't load (e.g. file://
   restrictions) the SAME core runs in a main-thread ScriptProcessor fallback,

/* ---- COMPRESSOR (superduper-dsp port) ---- */
function compGainDb(inputDb,thresholdDb,ratio,kneeDb){
  const kneeHalf=kneeDb*0.5,slope=1-1/Math.max(ratio,1);
  if(kneeDb>1e-4&&Math.abs(inputDb-thresholdDb)<=kneeHalf){
    const x=inputDb-thresholdDb+kneeHalf;return -(slope*x*x)/(2*kneeDb);
  }else if(inputDb>thresholdDb+kneeHalf)return -(inputDb-thresholdDb)*slope;
  return 0;
}
function pumpGainDb(inputDb,thresholdDb,ratio,kneeDb){
  const base=compGainDb(inputDb,thresholdDb,ratio,kneeDb);
  const over=inputDb-(thresholdDb+kneeDb*0.5);
  if(over<=0)return base;
  const t=Math.min(over/6,1);
  const boost=0.5*Math.cos(Math.PI*t)+0.5;
  return base*(1+0.25*boost);
}
function smoothGainDb(inputDb,thresholdDb,ratio,kneeDb){
  const kneeHalf=kneeDb*0.5,slope=1-1/Math.max(ratio,1);
  if(kneeDb>1e-4&&Math.abs(inputDb-thresholdDb)<=kneeHalf){
    const x=(inputDb-thresholdDb+kneeHalf)/kneeDb;
    const s=x*x*(3-2*x);return -slope*kneeHalf*s;
  }else if(inputDb>thresholdDb+kneeHalf)return -(inputDb-thresholdDb)*slope;
  return 0;
}
function compGainDbCurve(inputDb,thresholdDb,ratio,kneeDb,curve){
  if(curve===1)return pumpGainDb(inputDb,thresholdDb,ratio,kneeDb);
  if(curve===2)return smoothGainDb(inputDb,thresholdDb,ratio,kneeDb);
  return compGainDb(inputDb,thresholdDb,ratio,kneeDb);
}

// Halfband FIR coefficients for oversampling (11-tap, symmetric)
const HB_CENTER=0.5;
const HB_COEFS=[0.2870335424,0.1176470588,0.0476190476,0.0109890110,-0.0021978022];
// Saturation curves
function tapeClip(x,drive){const y=x*drive;return y/(1+Math.abs(y));}
function tubeClip(x,drive){const y=x*drive+0.08;
  const clipped=y>=0?y/(1+y*0.7):y/(1+Math.abs(y)*1.2);
  return clipped-0.08;}
function tanhDrive(x,drive){return Math.tanh(x*drive);}
function saturate(curve,x,drive){
  if(curve===1)return tubeClip(x,drive);
  if(curve===2)return tanhDrive(x,drive);
  return tapeClip(x,drive);}
// Tilt filter: one-pole at 1.5kHz split, ±6dB at tilt=±1
function tiltProcess(x,sr,tilt,lpState){
  const coef=Math.exp(-Math.PI*2*1500/sr);
  const lp=x*(1-coef)+lpState*coef;
  const hp=x-lp;
  const gHi=Math.pow(10,tilt*6/20);
  const gLo=Math.pow(10,-tilt*6/20);
  return [lp*gLo+hp*gHi,lp];
}
// DC blocker: y = x - xprev + 0.995*yprev
function dcBlock(x,state){const s=state;
  const y=x-s.xp+0.995*s.yp;
  s.xp=x;s.yp=y;return y;}
// Oversampler2x state
function makeOsState(){return{h:[0,0,0,0,0,0],w:0,oh:[0,0,0,0,0,0],wo:0};}

  const s=state;s.h[s.w]=x;const len=6;

  for(let i=0;i<5;i++){const a=(s.w+len-i)%len,b=(s.w+len-(10-i))%len;
    odd+=HB_COEFS[i]*(s.h[a]+s.h[b]);}

function osDownsample(state,even,odd){
  const s=state;s.oh[s.wo]=(even+odd)*0.5;const len=6;

  for(let i=0;i<5;i++){const a=(s.wo+len-i)%len,b=(s.wo+len-(10-i))%len;
    y+=HB_COEFS[i]*(s.oh[a]+s.oh[b]);}

function osApply(curve,sample,drive,osMode,os1,os2){
  if(osMode<1)return saturate(curve,sample,drive);
  if(osMode===1){const[e,o]=osUpsample(os1,sample);
    return osDownsample(os1,saturate(curve,e,drive),saturate(curve,o,drive));}
  const[e1,o1]=osUpsample(os1,sample);
  const[ee,eo]=osUpsample(os2,e1);
  const[oe,oo]=osUpsample(os2,o1);
  const ed=osDownsample(os2,saturate(curve,ee,drive),saturate(curve,eo,drive));
  const od=osDownsample(os2,saturate(curve,oe,drive),saturate(curve,oo,drive));
  return osDownsample(os1,ed,od);}

class Saturator extends Device{
  constructor(ctx){super(ctx);this.type='Saturator';this.name='Saturator';

    this._os1L=makeOsState();this._os1R=makeOsState();
    this._os2L=makeOsState();this._os2R=makeOsState();
    this.params={drive:6,type:0,tone:0,output:0,mix:1,os:1};
    this._createSP();this.applyParams();}
  _createSP(){if(this._sp)try{this._sp.onaudioprocess=null;this.input.disconnect(this._sp);this._sp.disconnect();}catch(e){}
    const ctx=this.ctx;
    try{this._sp=ctx.createScriptProcessor(2048,2,2);}catch(e){return;}
    const me=this;
    this._sp.onaudioprocess=function(ev){
      const ib=ev.inputBuffer,ob=ev.outputBuffer;
      const iL=ib.getChannelData(0),iR=ib.getChannelData(1)||iL;

/* ---- DELAY (superduper-dsp port) ---- */
function delayLineNew(capacity){
  const cap=Math.max(1024,1<<Math.ceil(Math.log2(capacity)));
  return{b:new Float32Array(cap),w:0,c:cap};}

  dl.b[dl.w]=x;dl.w=(dl.w+1)%dl.c;}
function delayLineReadLagrange3(dl,d){
  d=Math.max(1,Math.min(d,dl.c-2));
  const di=Math.floor(d),frac=d-di;
  const n=dl.c,base=(dl.w+n-di-1)%n;
  const ym1=dl.b[base],y0=dl.b[(base+1)%n],y1=dl.b[(base+2)%n],y2=dl.b[(base+3)%n];
  const c0=-frac*(frac-1)*(frac-2)/6;
  const c1=(frac+1)*(frac-1)*(frac-2)/2;
  const c2=-(frac+1)*frac*(frac-2)/2;
  const c3=(frac+1)*frac*(frac-1)/6;
  return c0*ym1+c1*y0+c2*y1+c3*y2;}
function onePoleLpProcess(z,x,sr,cutoffHz){
  const cutoff=Math.max(20,Math.min(cutoffHz,sr*0.45));

  d.env=rect+(d.env-rect)*coef;
  if(amtDb<=0.001)return 1;
  const drive=Math.min(d.env*4,1);
  return dbToGain(-amtDb*drive);}

// Dattorro plate constants
const R_DIFF_LENS=[142,107,379,277];

const R_TANK_MOD_GAIN=0.7;

function rLagrange3(buf,wi,cap,d){
  d=Math.max(1,Math.min(d,cap-3));
  const di=Math.floor(d),frac=d-di;

function rAllpassProcess(ap,x,lenFrac,g){
  const d=rLagrange3(ap.b,ap.i,R_AP_BUF,lenFrac);

function rModAllpassProcess(ap,x,lenFrac,g){
  const d=rLagrange3(ap.b,ap.i,R_AP_BUF,lenFrac);

  ap.b[ap.i]=v;ap.i=(ap.i+1)%R_AP_BUF;return y;

function rDelayTap(dl,off){return rLagrange3(dl.b,dl.i,R_TANK_BUF,off);}

    this._tankLD2={b:new Float32Array(R_TANK_BUF),i:0};
    this._tankRModAp={b:new Float32Array(R_AP_BUF),i:0};
    this._tankRD1={b:new Float32Array(R_TANK_BUF),i:0};
    this._tankRDampLp=0;

        me._tankLD2.i=(me._tankLD2.i+1)%R_TANK_BUF;

        const rIn=x+me._crossLtoR;

        me._tankRD1.b[me._tankRD1.i]=rAfterMod;
        const d1R=R_TANK_DELAY1_R*scale;
        const afterD1R=rDelayTap(me._tankRD1,d1R);
        me._tankRDampLp=afterD1R*(1-damp)+me._tankRDampLp*damp;
        const ap2R=R_TANK_AP2_R*scale;

        const afterD2R=rDelayTap(me._tankRD2,d2R);
        me._crossRtoL=afterD2R*decay;

        me._tankRD2.i=(me._tankRD2.i+1)%R_TANK_BUF;

          rDelayTap(me._tankRD1,266*scale)+
          rDelayTap(me._tankRD1,2974*scale)-
          rLagrange3(me._tankRAp2.b,me._tankRAp2.i,R_AP_BUF,1913*scale)+
          rDelayTap(me._tankRD2,1996*scale)-
          rDelayTap(me._tankLD1,1990*scale)-
          rLagrange3(me._tankLAp2.b,me._tankLAp2.i,R_AP_BUF,187*scale)-

          rDelayTap(me._tankLD1,353*scale)+
          rDelayTap(me._tankLD1,3627*scale)-
          rLagrange3(me._tankLAp2.b,me._tankLAp2.i,R_AP_BUF,1228*scale)+
          rDelayTap(me._tankLD2,2673*scale)-
          rDelayTap(me._tankRD1,2111*scale)-
          rLagrange3(me._tankRAp2.b,me._tankRAp2.i,R_AP_BUF,335*scale)-
          rDelayTap(me._tankRD2,121*scale);

function sDriveSample(x,amount){
  if(amount<=0.001)return x;
  const g=1+amount*4;
  return Math.tanh(x*g)/(1+0.5*amount);
}
// Schroeder reverb (Schroeder/Moorer): 4 parallel combs + 2 series allpasses
function srCombNew(sr,delaySec,t60,damp){
  const d=Math.max(1,Math.round(delaySec*sr));
  return{b:new Float32Array(d+1),w:0,c:d+1,dly:d,g:Math.pow(10,-3*delaySec/t60),lp:0,damp:damp};}
function srCombProcess(s,x){
  const rp=(s.w-s.dly+s.c)%s.c;
  const r=s.b[rp];
  const damped=r*(1-s.damp)+s.lp*s.damp;
  s.b[s.w]=x+s.g*damped;
  s.lp=damped;
  s.w=(s.w+1)%s.c;
  return r;
}
function srApNew(sr,delaySec,g){
  const d=Math.max(1,Math.round(delaySec*sr));
  return{b:new Float32Array(d+1),w:0,c:d+1,dly:d,g:g};}
function srApProcess(s,x){
  const rp=(s.w-s.dly+s.c)%s.c;
  const r=s.b[rp];
  const y=-s.g*x+r;
  s.b[s.w]=x+s.g*y;
  s.w=(s.w+1)%s.c;
  return y;

function makeSchroeder(sr,roomSize,t60,damp){
  const sc=roomSize/35;

  const ad=[0.005,0.0017].map(d=>d*sc);
  return{combsL:cd.map(d=>srCombNew(sr,d,t60,damp)),combsR:cd.map(d=>srCombNew(sr,d,t60,damp)),apsL:ad.map(d=>srApNew(sr,d,0.5)),apsR:ad.map(d=>srApNew(sr,d,0.5))};}

  let sl=0,sr2=0;
  for(let i=0;i<4;i++){sl+=srCombProcess(s.combsL[i],l);sr2+=srCombProcess(s.combsR[i],r);}
  let al=sl+0.5*sr2,ar=sr2+0.5*sl;
  al=srApProcess(s.apsL[0],al);ar=srApProcess(s.apsR[0],ar);
  al=srApProcess(s.apsL[1],al+0.3*ar);ar=srApProcess(s.apsR[1],ar+0.3*al);

// Chorus voice: modulated delay via Lagrange-3
function chVoiceNew(sr,baseMs,depthMs,rateHz,phase){
  const maxMs=baseMs+depthMs+2;

  return{dlL:delayLineNew(cap),dlR:delayLineNew(cap),base:baseMs*0.001*sr,depth:depthMs*0.001*sr,rate:rateHz,phase:phase||0};}

  v.phase+=v.rate/sr;
  if(v.phase>=1)v.phase-=1;
  const mod=Math.sin(v.phase*Math.PI*2)*v.depth;
  const d=Math.max(v.base+mod,1);
  delayLineWrite(v.dlL,l);delayLineWrite(v.dlR,r);
  return[delayLineReadLagrange3(v.dlL,d),delayLineReadLagrange3(v.dlR,d)];

  buildUI(card){const row=document.createElement('div');row.className='knobRow';
    row.appendChild(makeKnob(this,'mix','Mix',0,1,false,'lin','mix'));
    row.appendChild(makeKnob(this,'width','Width',0,1,false,'lin','width'));

// SVF helper: TPT/ZDF state-variable filter
function svfProcess(x, mode, cutoffHz, resonance, sr, state) {
  const g = Math.tan(Math.PI * clamp(cutoffHz, 20, sr * 0.49) / sr);
  const k = 2 - 2 * clamp(resonance, 0, 0.97);
  const a1 = 1 / (1 + g * (g + k));
  const v1 = a1 * (state.z1 + g * (x - state.z2));
  const lp = state.z2 + g * v1;
  const hp = x - k * v1 - lp;
  const bp = v1;
  state.z1 = 2 * v1 - state.z1;
  state.z2 = 2 * lp - state.z2;
  switch (mode) {
    case 0: return lp;  // LP
    case 1: return hp;  // HP
    case 2: return bp;  // BP
    case 3: return x - k * v1; // Notch
    default: return lp;
  }
}

    case 3: return p < 0.5 ? 1 : -1;

      if(Math.abs(lo-me._lastLo)>1||Math.abs(hi-me._lastHi)>1||Math.abs(q-me._lastQ)>0.05){
        me._rebuildBanks(lo,hi,q);
      }
      for(let i=0;i<n;i++){
        const xl=iL[i],xr=iR[i];
        const mid=(xl+xr)*0.5;
        // 1) bandpass mid → envelope in dB
        const envDb=new Float32Array(N);
        for(let b=0;b<N;b++){
          const bandMid=(biquadProcess(bpL[b],mid)+biquadProcess(bpR[b],mid))*0.5;
          const rect=Math.abs(bandMid);
          const tc=rect>env[b]?1:20;
          const coef=Math.exp(-1/(tc*0.001*sr));
          env[b]=rect+(env[b]-rect)*coef;
          envDb[b]=20*Math.log10(env[b]+1e-10);
        }
        // 2) baseline = mean of 4 nearest neighbours (dB)
        const baselineDb=new Float32Array(N);
        for(let b=0;b<N;b++){
          let sum=0,count=0;
          for(let off=-2;off<=2;off++){
            if(off===0)continue;
            const j=clamp(b+off,0,N-1);
            sum+=envDb[j];count++;
          }
          baselineDb[b]=sum/count;
        }
        // 3) excess → cut → peaking EQ
        for(let b=0;b<N;b++){
          const excess=envDb[b]-baselineDb[b]-sens;
          const targetCut=excess>0?-(Math.min(excess*ratio*(amount/12),amount)):0;
          const coef=targetCut<cutDb[b]?coefAtt:coefRel;
          cutDb[b]=targetCut+(cutDb[b]-targetCut)*coef;
          const f=centres[b];
          biquadSetPeaking(eqL[b],sr,f,q,cutDb[b]);
          biquadSetPeaking(eqR[b],sr,f,q,cutDb[b]);
        }
        // 4) cascade all 24 peaking EQs on each channel
        let yl=xl,yr=xr;
        for(let b=0;b<N;b++){
          yl=biquadProcess(eqL[b],yl);
          yr=biquadProcess(eqR[b],yr);
        }
        oL[i]=xl*(1-mix)+yl*mix*outLin;
        oR[i]=xr*(1-mix)+yr*mix*outLin;
      }
    };
    this.input.connect(this._sp);this._sp.connect(this.output);
  }
  applyParams(){const p=this.params;
    this._amt=clamp(p.amount,0,24);
    this._sens=clamp(p.sens,-24,0);
    this._q=clamp(p.q,2,12);
    this._lo=clamp(p.lo,100,2000);
    this._hi=clamp(p.hi,3000,16000);
    this._atkMs=clamp(p.attack,0.5,30);
    this._relMs=clamp(p.release,10,500);
    this._mix=clamp(p.mix,0,1);
    this._output=clamp(p.output,-24,24);
    this._mode=Math.round(clamp(p.mode,0,2));
    // rebuild filter bank arrays
    const N=this._N,sr=this.ctx.sampleRate;
    const lo=this._lo,hi=this._hi,q=this._q;
    this._bpL=new Array(N);this._bpR=new Array(N);
    this._eqL=new Array(N);this._eqR=new Array(N);
    this._env=new Float32Array(N);
    this._cutDb=new Float32Array(N);
    this._centres=new Float32Array(N);
    for(let i=0;i<N;i++){this._bpL[i]=makeBiquad();this._bpR[i]=makeBiquad();this._eqL[i]=makeBiquad();this._eqR[i]=makeBiquad();}
    this._rebuildBanks(lo,hi,q);
  }
  buildUI(card){const row=document.createElement('div');row.className='knobRow';
    row.appendChild(makeKnob(this,'amount','Amount',0,24,false,'lin','amount'));
    row.appendChild(makeKnob(this,'sens','Sens',-24,0,false,'lin','sens'));
    row.appendChild(makeKnob(this,'q','Q',2,12,false,'lin','q'));
    row.appendChild(makeKnob(this,'lo','Lo',100,2000,false,'log','lo'));
    row.appendChild(makeKnob(this,'hi','Hi',3000,16000,false,'log','hi'));
    row.appendChild(makeKnob(this,'attack','Attack',0.5,30,false,'lin','attack'));
    row.appendChild(makeKnob(this,'release','Release',10,500,false,'lin','release'));
    row.appendChild(makeKnob(this,'mix','Mix',0,1,false,'lin','mix'));
    row.appendChild(makeKnob(this,'output','Output',-24,24,false,'lin','output'));
    row.appendChild(makeKnob(this,'mode','Mode',0,2,true,'lin','mode'));
    card.appendChild(row);}
  dispose(){try{if(this._sp){this._sp.onaudioprocess=null;this.input.disconnect(this._sp);this._sp.disconnect();}}catch(e){}
    try{this.input.disconnect();this.output.disconnect();}catch(e){}}
}

class HybridReverb extends Device{
  constructor(ctx){super(ctx);this.type='HybridReverb';this.name='HybridReverb';
    this.conv=ctx.createConvolver();
    this.preDelay=ctx.createDelay(0.5);
    this.dampLP=ctx.createBiquadFilter();this.dampLP.type='lowpass';this.dampLP.frequency.value=20000;
    this.wetG=ctx.createGain();this.dryG=ctx.createGain();

    this.eqHP=ctx.createBiquadFilter();this.eqHP.type='highpass';this.eqHP.frequency.value=62.5;

    this.gSideP=ctx.createGain();this.gSideN=ctx.createGain();this.gSideInv=ctx.createGain();
    this.input.connect(this.dryG).connect(this.output);
    this.input.connect(this.preDelay).connect(this.eqHP).connect(this.eqLP).connect(this.conv);
    this.conv.connect(this.dampLP).connect(this.wSplitter);
    this.wSplitter.connect(this.gMid,0);this.wSplitter.connect(this.gMid,1);
    this.gMid.gain.value=0.5;
    this.wSplitter.connect(this.gSideP,0);this.gSideP.gain.value=0.5;
    this.wSplitter.connect(this.gSideN,1);this.gSideN.gain.value=-0.5;
    this.gSideP.connect(this.gSide);this.gSideN.connect(this.gSide);
    this.gSideInv.gain.value=-1;
    this.gMid.connect(this.wMerger,0,0);this.gMid.connect(this.wMerger,0,1);
    this.gSide.connect(this.wMerger,0,0);this.gSide.connect(this.gSideInv);
    this.gSideInv.connect(this.wMerger,0,1);
    this.wMerger.connect(this.wetG).connect(this.output);
    this.params={mix:0,decay:2,size:1,preDelay:15,damping:0.5,width:1,loCut:62.5,hiCut:16000,envelope:0,envelopeAmt:0};
    this._irLoaded=null;this._irName='';
    this._rebuildIR();this.applyParams();}
  async loadIR(url,name){
    try{const resp=await fetch(url);if(!resp.ok)throw new Error('HTTP '+resp.status);
      const buf=await resp.arrayBuffer();
      const ab=await this.ctx.decodeAudioData(buf);
      this._irLoaded=ab;this._irName=name||url.split('/').pop();
      if(this._irLabel)this._irLabel.textContent=this._irName;
      if(this._irLabel)this._irLabel.style.display='';
      this.conv.buffer=ab;}catch(e){console.warn('IR load failed:',e);}}
  _rebuildIR(){const now=Date.now();if(this._irTimer&&now-this._irTimer<80)return;
    this._irTimer=now;
    if(this._irLoaded){this.conv.buffer=this._irLoaded;return;}
    const ctx=this.ctx,p=this.params;
    const decay=clamp(p.decay,0.3,6),size=clamp(p.size,0.3,2);
    const dur=decay*size*1.5,rate=ctx.sampleRate,len=Math.round(dur*rate);
    if(len<64)return;
    const buf=ctx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
      const envAmt=clamp(p.envelope,0,1);
      for(let i=0;i<len;i++){const t=i/rate;
        let ir=(Math.random()*2-1)*Math.pow(1-t/dur,1.5)*Math.exp(-t*0.6/size);
        // envelope shaping
        if(envAmt>0){const envGain=Math.pow(t/dur,clamp(p.envelopeAmt,0.1,4));
          ir*=envGain*envAmt+(1-envAmt);}

        if(ch===1)d[i]=ir*(0.7+0.3*Math.sin(i*0.07));

      }}

  applyParams(skipIR){const t=this.ctx.currentTime,T=0.008,p=this.params;
    this.preDelay.delayTime.setTargetAtTime(clamp(p.preDelay/1000,0,0.4),t,T);
    this.dampLP.frequency.setTargetAtTime(20000-clamp(p.damping,0,1)*18000,t,T);
    this.wetG.gain.setTargetAtTime(clamp(p.mix,0,1),t,T);
    this.dryG.gain.setTargetAtTime(1-clamp(p.mix,0,1)*0.5,t,T);
    this.eqLP.frequency.setTargetAtTime(clamp(p.hiCut,1000,20000),t,T);
    this.eqHP.frequency.setTargetAtTime(clamp(p.loCut,20,2000),t,T);
    this.gSide.gain.setTargetAtTime(clamp(p.width,0,1),t,T);
    if(!skipIR)this._rebuildIR();}
  buildUI(card){const me=this;
    const wrap=document.createElement('div');wrap.className='irWaveformWrap';
    // knobs row
    const row=document.createElement('div');row.className='knobRow';row.style.alignItems='center';
    row.appendChild(makeKnob(this,'mix','Mix',0,1,false,'lin','mix'));
    row.appendChild(makeKnob(this,'decay','Decay',0.3,6,false,'lin','decay'));
    row.appendChild(makeKnob(this,'size','Size',0.3,2,false,'lin','size'));
    row.appendChild(makeKnob(this,'preDelay','PreDly',0,200,false,'lin','preDelay'));
    row.appendChild(makeKnob(this,'damping','Damp',0,1,false,'lin','damping'));
    row.appendChild(makeKnob(this,'width','Width',0,1,false,'lin','width'));
    row.appendChild(makeKnob(this,'loCut','Lo Cut',20,2000,false,'log','loCut'));
    row.appendChild(makeKnob(this,'hiCut','Hi Cut',1000,20000,false,'log','hiCut'));
    row.appendChild(makeKnob(this,'envelope','Env',0,1,false,'lin','envelope'));
    row.appendChild(makeKnob(this,'envelopeAmt','Env Shp',0.1,4,false,'log','envelopeAmt'));
    // Load IR button centered among knobs
    const sep=document.createElement('div');sep.style.cssText='width:1px;height:24px;background:#444;flex-shrink:0';
    row.appendChild(sep);
    const irBtn=document.createElement('button');irBtn.textContent='Load IR';irBtn.style.cssText='height:22px;font-size:10px;padding:0 12px;border-radius:3px;border:1px solid var(--line2);background:#2a2d30;color:var(--txt);cursor:pointer;flex-shrink:0';
    irBtn.addEventListener('click',()=>{
      const inp=document.createElement('input');inp.type='file';inp.accept='.wav,.aiff,.aif,.mp3,.ogg,.flac';
      inp.onchange=async()=>{const f=inp.files[0];if(!f)return;
        const ab=await f.arrayBuffer();
        try{const buf=await me.ctx.decodeAudioData(ab);
          me._irLoaded=buf;me._irName=f.name;
          if(me._irLabel)me._irLabel.textContent=me._irName;
          if(me._irLabel)me._irLabel.style.display='';
          me.conv.buffer=buf;}catch(e){alert('Failed to decode audio file');}};
      inp.click();});
    row.appendChild(irBtn);
    wrap.appendChild(row);
    // IR name label (above canvas, hidden for synthetic)
    this._irLabel=document.createElement('div');this._irLabel.style.cssText='font-size:10px;color:var(--txt-dim);padding:0 2px;flex-shrink:0';
    this._irLabel.textContent=this._irName||'';
    if(!this._irName)this._irLabel.style.display='none';
    wrap.appendChild(this._irLabel);
    // IR waveform canvas (fills remaining space)
    const cvw=document.createElement('div');cvw.className='irWaveformCv';
    const cv=document.createElement('canvas');cvw.appendChild(cv);wrap.appendChild(cvw);
    this._irCv=cv;
    card.appendChild(wrap);}
  tick(){const cv=this._irCv;if(!cv||!cv.isConnected)return;
    const r=cv.getBoundingClientRect();if(r.width<10||r.height<10)return;
    const W=Math.round(r.width*devicePixelRatio),H=Math.round(r.height*devicePixelRatio);
    if(cv.width!==W)cv.width=W;if(cv.height!==H)cv.height=H;
    const g=cv.getContext('2d');g.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    const w=r.width,h=r.height;
    g.clearRect(0,0,w,h);
    const buf=this.conv.buffer;if(!buf)return;
    const ch0=buf.getChannelData(0);if(!ch0||ch0.length<2)return;
    const len=ch0.length;
    // draw background fill
    g.fillStyle='rgba(90,134,196,.12)';g.beginPath();g.moveTo(0,h/2);
    for(let i=0;i<w;i++){const idx=Math.floor(i/ w*len);
      const val=clamp(ch0[idx],-1,1);
      g.lineTo(i,h/2-val*(h/2-2));}
    g.lineTo(w,h/2);g.closePath();g.fill();
    // draw waveform line
    g.strokeStyle='rgba(90,134,196,.6)';g.lineWidth=1;g.beginPath();
    for(let i=0;i<w;i++){const idx=Math.floor(i/ w*len);
      const val=clamp(ch0[idx],-1,1);
      i?g.lineTo(i,h/2-val*(h/2-2)):g.moveTo(0,h/2-val*(h/2-2));}
    g.stroke();
    // draw center line
    g.strokeStyle='rgba(255,255,255,.12)';g.lineWidth=1;g.beginPath();
    g.moveTo(0,h/2);g.lineTo(w,h/2);g.stroke();}
  dispose(){try{this.preDelay.disconnect();}catch(e){}
    try{this.dampLP.disconnect();}catch(e){}
    try{this.wSplitter.disconnect();this.wMerger.disconnect();}catch(e){}
    try{this.gMid.disconnect();this.gSide.disconnect();this.gSideP.disconnect();this.gSideN.disconnect();this.gSideInv.disconnect();}catch(e){}
    try{this.input.disconnect();this.output.disconnect();}catch(e){}}
}

const DEVICES={'EQ Eight':EQ8,'Compressor':Compressor,'Saturator':Saturator,'Delay':Delay,'Reverb':Reverb,'Supermass':Supermass,'Limiter':Limiter,'Chorus':Chorus,'Filter':Filter,'Soothe':Soothe,'HybridReverb':HybridReverb};

/* =======================================================================
   MODULATORS — LFO / Envelope Follower / Shaper with knob mapping.
   Each modulator outputs a control value every animation frame (also while
   transport is stopped). Mapped targets are driven RELATIVE to a stored
   base (manual) value, so modulation never destroys the knob's own setting
   and the base is restored when a map is removed. Modulators can also map
   each other's parameters.
   ======================================================================= */
const MOD_PARAM_SPECS={
  rate:{label:'Rate',min:0.05,max:20,scale:'log'},
  depth:{label:'Depth',min:0,max:1,scale:'lin'},
  phase:{label:'Phase',min:0,max:1,scale:'lin'},
  attack:{label:'Rise',min:1,max:500,scale:'log'},
  release:{label:'Fall',min:10,max:2000,scale:'log'},
  shape:{label:'Shape',min:0,max:1,scale:'lin'},
  bias:{label:'Offset',min:-0.5,max:0.5,scale:'lin'}};
const MOD_WAVE_NAMES=['Sine','Square','Saw','Tri','S&H','Noise'];
function makeModDropdown(items,curVal,onChange){
  const wrap=document.createElement('div');wrap.style.cssText='position:relative;display:inline-flex';

  const rep=()=>{const o=items.find(x=>x[0]===curVal);if(o)btn.textContent=o[1];};
  rep();
  const list=document.createElement('div');
  list.style.cssText='position:fixed;z-index:999;background:#2a2d30;border:1px solid #3a3d40;border-radius:3px;display:none;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.5);min-width:80px;max-height:180px;font-size:9px';
  const fill=()=>{list.innerHTML='';items.forEach(([v,l])=>{
    const row=document.createElement('div');
    row.style.cssText='padding:4px 6px;cursor:pointer;color:#cfcfcf;white-space:nowrap'+(v===curVal?';background:#3d3d3d':'');
    row.onmouseenter=()=>row.style.background='#3d3d3d';
    row.onmouseleave=()=>row.style.background=v===curVal?'#3d3d3d':'';
    row.textContent=l;
    row.onclick=()=>{curVal=v;rep();close();onChange(v);};
    list.appendChild(row);});};
  const pos=()=>{const r=btn.getBoundingClientRect();
    list.style.left=r.left+'px';list.style.top=r.bottom+'px';
    list.style.minWidth=Math.max(r.width,80)+'px';};
  let open=false;
  const close=()=>{open=false;list.style.display='none';if(list.parentNode)list.parentNode.removeChild(list);};
  btn.onclick=e=>{e.stopPropagation();open=!open;
    if(open){fill();document.body.appendChild(list);list.style.display='block';pos();}
    else close();};
  const cl=ev=>{if(!wrap.contains(ev.target)&&!list.contains(ev.target)){close();document.removeEventListener('pointerdown',cl,{capture:true});}};
  btn.addEventListener('pointerdown',()=>{setTimeout(()=>document.addEventListener('pointerdown',cl,{capture:true}),0);});
  wrap.appendChild(btn);
  return wrap;
}

class ModulatorDevice extends Device{
  constructor(ctx){super(ctx);this.type='Modulator';this.name='Modulator';
    this.params={mode:0, waveform:0, rate:1, depth:1, phase:0, attack:10, release:200, shape:0, bias:0};
    this._phase=0;this._absPhase=0;this._heldCycle=-1;this._held=0;
    this._envelope=0;this._out=0;this._noise=0;
    this._hist=new Float32Array(240);this._histLen=0;
    this._maps=[];this._mappingMode=false;this._cv=null;this._outEl=null;this._fixedMode=false;this._envBuf=null;}
  _waveValue(ph,wf){
    ph=((ph%1)+1)%1;
    if(wf===0)return Math.sin(ph*2*Math.PI);
    if(wf===1)return ph<0.5?1:-1;
    if(wf===2)return 1-2*ph;                 // saw down (classic decay ramp)
    if(wf===3)return 1-4*Math.abs(ph-0.5);   // triangle, peak at center
    if(wf===4)return this._held;             // sample & hold
    if(wf===5)return this._noise;            // noise
    return 0;}
  _shapeCurve(v){ // v in -1..1 -> shaped -1..1
    const s=this.params.shape||0;
    if(s<0.001)return v;
    if(s<0.5){const d=1+s*8;return Math.tanh(v*d)/Math.tanh(d);}      // saturate
    const fold=(s-0.5)*6;let x=v*(1+fold);                            // wavefold
    while(x>1||x<-1){if(x>1)x=2-x;if(x<-1)x=-2-x;}
    return x;}
  /* dt — seconds since last frame, tk — track object (used by EnvFollower
     to read audio from the track's AnalyserNode).
     Returns control output: LFO is bipolar (-1..1), Env Follower and
     Shaper are unipolar (0..1). */
  tick(dt,tk){
    if(!this.enabled){this._out=0;return 0;}
    const p=this.params;let v=0;
    if(p.mode===1){ // ENVELOPE FOLLOWER — reads audio from track's AnalyserNode (with sidechain support)
      let rawLevel=0;
      let srcTrack=tk;
      if(this._sidechainIdx>=0&&this._sidechainIdx<App.tracks.length)srcTrack=App.tracks[this._sidechainIdx];
      if(srcTrack&&srcTrack.analyser){
        if(!this._envBuf||this._envBuf.length!==srcTrack.analyser.fftSize)this._envBuf=new Uint8Array(srcTrack.analyser.fftSize);
        srcTrack.analyser.getByteTimeDomainData(this._envBuf);
        let sum=0;
        for(let i=0;i<this._envBuf.length;i++){const s=Math.abs(this._envBuf[i]-128)/128;sum+=s*s;}
        rawLevel=Math.sqrt(sum/this._envBuf.length);
      }
      const target=clamp(rawLevel*2.5,0,1);
      const aT=Math.max(0.001,(p.attack||10)/1000);
      const rT=Math.max(0.005,(p.release||200)/1000);
      const k=target>this._envelope?(1-Math.exp(-dt/aT)):(1-Math.exp(-dt/rT));
      this._envelope=clamp(this._envelope+(target-this._envelope)*k,0,1);
      v=this._envelope*p.depth;
      v=clamp(v+(p.bias||0),0,1);}
    else{ // LFO (mode 0) and SHAPER (mode 2) — phase-driven
      this._absPhase+=dt*Math.max(0.01,p.rate||1);
      this._phase=this._absPhase%1;
      const cyc=Math.floor(this._absPhase*( (p.waveform===4)?8:1 ));
      if(cyc!==this._heldCycle){this._heldCycle=cyc;this._held=Math.random()*2-1;this._noise=Math.random()*2-1;}
      if(p.waveform===5)this._noise+= (Math.random()*2-1)*0.4, this._noise=clamp(this._noise,-1,1);
      const ph=(this._phase+(p.phase||0))%1;
      let raw=this._waveValue(ph,p.waveform);
      if(p.mode===2)raw=this._shapeCurve(raw);
      if(p.mode===2){v=clamp((raw*0.5+0.5)*p.depth+(p.bias||0),0,1);}      // shaper: unipolar
      else{v=clamp(raw*p.depth+(p.bias||0)*2,-1,1);}}                      // lfo: bipolar
    this._out=v;
    // history ring for the display
    if(this._histLen<this._hist.length){this._hist[this._histLen++]=v;}
    else{this._hist.copyWithin(0,1);this._hist[this._hist.length-1]=v;}
    return v;}
  /* draw the live waveform / envelope / curve */
  _drawWave(){
    const cv=this._cv;if(!cv||!cv.isConnected)return;
    const r=cv.getBoundingClientRect();if(r.width<10||r.height<10)return;
    const W=Math.round(r.width*devicePixelRatio),H=Math.round(r.height*devicePixelRatio);
    if(cv.width!==W)cv.width=W;if(cv.height!==H)cv.height=H;
    const g=cv.getContext('2d');g.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    const w=r.width,h=r.height,p=this.params;
    g.clearRect(0,0,w,h);
    g.fillStyle='#0c0e11';g.fillRect(0,0,w,h);
    g.strokeStyle='#1d2126';g.lineWidth=0.5;
    for(let i=1;i<4;i++){const y=(i/4)*h;g.beginPath();g.moveTo(0,y);g.lineTo(w,y);g.stroke();
      const x=(i/4)*w;g.beginPath();g.moveTo(x,0);g.lineTo(x,h);g.stroke();}
    const WAVE='#f5a832',DOT='#ffd27a';
    const yOf=biV=>(0.5-biV*0.42)*h;          // bipolar -1..1 -> y
    const yOfU=uV=>h-3-uV*(h-8);              // unipolar 0..1 -> y
    if(p.mode===1){ // env follower — scrolling history (unipolar)
      g.strokeStyle='#2a2f35';g.beginPath();g.moveTo(0,yOfU(0));g.lineTo(w,yOfU(0));g.stroke();

  const playing=engine.state!=='STOPPED';
  const beat=playing?engine.nowBeat():0;
  App.tracks.forEach(tk=>{
    if(!tk.modulators||!tk.modulators.length){releaseModTargets(tk);return;}
    if(!tk._modBase)tk._modBase={};

    const n=new Float32Array(outLen);for(let i=0;i<nf;i++){const ip=Math.min(i*HOP_A,inLen-WIN);

    for(let i=0;i<outLen;i++)if(n[i]>0.001)o[i]/=n[i];out.push(o);}

      node.connect(g).connect(this.input);entry.gain=g;
      const gen=entry.gen=(entry.gen||0)+1;
      const live=()=>entry.gen===gen&&entry.playing;
      const s=clip.stretch;
      const endAbs=when+actualOutSec;
      const baseParams={semitones:clip.pitch||0,formantSemitones:s.formantOn?(s.formantSemitones||0):0,
        formantCompensation:s.formantOn,tonalityHz:s.tonalityHz||8000,
        loopStart:_loopStartParams,loopEnd:_loopEndParams};
      // NOTE: SignalsmithStretch v1.3 effectively keeps only ONE pending scheduled
      // change: scheduling anything with a future outputTime discards every earlier
      // segment in its time map (including a just-started active segment). So we
      // schedule the first segment immediately and every later change just-in-time.
      const useMarkers=s.markers&&s.markers.length>0&&beatOffset<=0.001;
      let segs;
      if(!useMarkers){
        segs=[{out:when,input:inputPos,rate:rate}];
      }else{
        segs=[];
        computeStretchSegments(clip,buf,spb).forEach(sg=>{
          if(!sg.active)return;
          const segOut=when+(sg.output||0);
          if(segOut>=endAbs)return;
          segs.push({out:segOut,input:sg.input,rate:Math.max(0.01,Math.min(10,sg.rate))});
        });
        segs.sort((a,b)=>a.out-b.out);
        if(!segs.length)segs=[{out:when,input:inputPos,rate:rate}];
      }
      const schedSeg=sg=>{try{node.schedule(Object.assign({active:true,input:sg.input,output:sg.out,outputTime:sg.out,rate:sg.rate},baseParams));}catch(e){}};
      schedSeg(segs[0]);
      for(let i=1;i<segs.length;i++){const sg=segs[i];
        this.engine.scheduleEvent(sg.out,()=>{if(live())schedSeg(sg);});}
      // Hard gain cut exactly at the clip end — the worklet would otherwise keep
      // reading sample data past clip.end until the deactivate fires.
      if(!(fadeOut>0)){
        try{g.gain.setValueAtTime(fullGain,Math.max(when,endAbs-0.004));
          g.gain.linearRampToValueAtTime(0,endAbs);}catch(e){}}
      // Deactivate the worklet just after the (already silent) end.
      this.engine.scheduleEvent(endAbs+0.05,()=>{
        if(!live())return;
        const t=Math.max(c.currentTime,endAbs+0.05);
        try{node.schedule({active:false,output:t,outputTime:t});}catch(e){}
        entry.playing=false;});
      const stopCtrl=(stopWhen)=>{const t=(typeof stopWhen==='number'&&stopWhen>0)?stopWhen:c.currentTime;
        entry.gen=(entry.gen||0)+1;
        try{node.schedule({active:false,output:t,outputTime:t});}catch(e){}
        entry.playing=false;};
      this._sources.push({stop:stopCtrl});});}
  _startClipWSOLA(clip,buf,when,beatOffset,spb,rate,inputPos,actualOutSec){
    try{
      const c=this.ctx;const sr=c.sampleRate;const outRemainBeats=clip.length-beatOffset;
      let inpStartSample=Math.max(0,Math.round(inputPos*sr));
      let inpLen=Math.max(64,Math.round(actualOutSec*rate*sr));
      if(inpStartSample+inpLen>buf.length)inpLen=Math.max(64,buf.length-inpStartSample);
      if(inpLen<64)return false;
      // handle late init: if scheduled time passed, shift playback
      const now=c.currentTime;
      if(when<now){
        const diff=now-when;
        when=now;
        const inpAdvance=Math.min(inpLen-64,Math.round(diff*rate*sr));
        inpStartSample+=inpAdvance;inpLen-=inpAdvance;
        if(inpLen<64)return false;
        actualOutSec=Math.max(0.001,actualOutSec-diff);}
      const nc=Math.min(buf.numberOfChannels,2);const chData=[];
      for(let ch=0;ch<nc;ch++)chData.push(buf.getChannelData(ch).subarray(inpStartSample,inpStartSample+inpLen));
      const pitchShift=Math.pow(2,(clip.pitch||0)/12);
      const wsolaFactor=Math.min(10,Math.max(0.1,(1/rate)*pitchShift));
      const stretched=wsolaStretch(chData,sr,wsolaFactor);
      const outLen=Math.max(1,Math.round(actualOutSec*sr*pitchShift));
      const newBuf=c.createBuffer(nc,Math.min(outLen,192000*sr),sr);
      for(let ch=0;ch<nc;ch++){const d=newBuf.getChannelData(ch);const s=stretched[Math.min(ch,stretched.length-1)];
        const n=Math.min(d.length,s.length);
        for(let i=0;i<n;i++)d[i]=Math.max(-1,Math.min(1,s[i]));}
      const src=c.createBufferSource();src.buffer=newBuf;src.playbackRate.value=pitchShift;
      const g=c.createGain();const fullGain=clip.gain||1;g.gain.value=fullGain;
      const fadeIn=clip.fadeIn||0,fadeOut=clip.fadeOut||0,fcIn=clip.fadeInCurve||0,fcOut=clip.fadeOutCurve||0;
      if(fadeIn>0&&beatOffset<fadeIn){const fadeInSec=(fadeIn-beatOffset)*spb;
        g.gain.setValueAtTime(0,when);
        if(fcIn===0)g.gain.linearRampToValueAtTime(fullGain,when+fadeInSec);
        else{const n=32,vals=new Float32Array(n);
          for(let i=0;i<n;i++){const t=i/(n-1);let vt=fcIn>0?Math.pow(t,1+fcIn*3):Math.pow(t,1/(1-fcIn*3));vals[i]=vt*fullGain;}
          g.gain.setValueCurveAtTime(vals,when,fadeInSec);}}
      if(fadeOut>0&&outRemainBeats>0){const fadeOutSec=Math.min(fadeOut,outRemainBeats)*spb;
        const fadeStart=when+actualOutSec-fadeOutSec;
        if(fcOut===0){g.gain.setValueAtTime(fullGain,fadeStart);g.gain.linearRampToValueAtTime(0,when+actualOutSec);}
        else{g.gain.setValueAtTime(fullGain,fadeStart);
          const n=32,vals=new Float32Array(n);
          for(let i=0;i<n;i++){const t=i/(n-1);let vt=fcOut>0?Math.pow(t,1+fcOut*3):Math.pow(t,1/(1-fcOut*3));vals[i]=fullGain*(1-vt);}
          g.gain.setValueCurveAtTime(vals,fadeStart,fadeOutSec);}}
      src.connect(g).connect(this.input);
      const startWhen=Math.max(when,c.currentTime);
      try{src.start(startWhen,0);}catch(e){try{src.start(startWhen);}catch(e2){}}
      this._sources.push(src);
      return true;
    }catch(e){console.warn('[WSOLA] failed:',e);return false;}}
  scheduleArr(from,to,firstWindow,playStart){
    for(const clip of this.clips){
      const visLen=clip.loopEnabledExt&&clip.visualDurExt?(clip.visualDurExt/engine.secPerBeat):(clip.visualLen||clip.length);
      const cs=clip.startBeat,ce=cs+visLen;
      if(stretchReady&&clip.stretch?.enabled&&!this._stretchNodes.has(clip.id)&&!this._stretchInitQueue.has(clip.id)){
        const buf=clip.reverse?(clip._rev||(clip._rev=reversedBuffer(clip.buffer))):clip.buffer;
        if(buf)this._initStretchNode(clip,buf);}
      if(firstWindow&&cs<=playStart&&playStart<ce){
        this._startClip(clip,this.engine.beatToTime(playStart),playStart-cs);continue;}
      if(cs>=from&&cs<to)this._startClip(clip,this.engine.beatToTime(cs),0);}}
  readVu(){this.analyser.getByteTimeDomainData(this._buf);let peak=0;
    for(let i=0;i<this._buf.length;i++){const v=Math.abs(this._buf[i]-128)/128;if(v>peak)peak=v;}
    this.vu=Math.max(peak,this.vu*0.85);return this.vu;}
  dispose(){this._destroyStretchNodes();
    try{this.input.disconnect();this.volGain.disconnect();this.panner.disconnect();this.analyser.disconnect();}catch(e){}}
}

function vDrag(el,getter,setter,step){el.addEventListener('pointerdown',e=>{e.preventDefault();
  el.setPointerCapture(e.pointerId);const sy=e.clientY,sv=getter();
  const mv=ev=>setter(sv+(sy-ev.clientY)*step);
  const up=()=>{el.removeEventListener('pointermove',mv);el.removeEventListener('pointerup',up);};
  el.addEventListener('pointermove',mv);el.addEventListener('pointerup',up);});}
function posDrag(el,setter){ // horizontal 0..1 based on x within element
  const handle=e=>{const r=el.getBoundingClientRect();setter(clamp((e.clientX-r.left)/r.width,0,1));};
  el.addEventListener('pointerdown',e=>{e.preventDefault();el.setPointerCapture(e.pointerId);handle(e);
    const mv=ev=>handle(ev);const up=()=>{el.removeEventListener('pointermove',mv);el.removeEventListener('pointerup',up);};
    el.addEventListener('pointermove',mv);el.addEventListener('pointerup',up);});}

/* Double-press detection via pointer events. Native 'dblclick' never fires on
   elements whose pointerdown handlers call preventDefault() (vDrag/posDrag/EQ8
   dials do), because cancelling pointerdown suppresses the compatibility mouse
   events. This helper works regardless. */
function dblPress(el,fn){let lt=0,lx=0,ly=0;
  el.addEventListener('pointerdown',e=>{const now=performance.now();
    if(now-lt<350&&Math.abs(e.clientX-lx)<6&&Math.abs(e.clientY-ly)<6){lt=0;fn(e);}
    else{lt=now;lx=e.clientX;ly=e.clientY;}});}

/* Factory default params per device/modulator type — used by knob dblclick-reset.
   Built lazily from a pristine instance, so reset works correctly even after a
   project load / device copy mutated params before the first UI build. */
const _FACTORY_DEFS={};
function factoryDefaults(obj){const t=obj&&obj.type;
  if(!t||!engine.ctx)return null;
  if(t in _FACTORY_DEFS)return _FACTORY_DEFS[t];
  const Cls=DEVICES[t]||MODULATORS[t];
  if(!Cls){_FACTORY_DEFS[t]=null;return null;}
  try{const tmp=new Cls(engine.ctx);
    const defs=tmp.params?{...tmp.params}:null;
    if(tmp.dispose){try{tmp.dispose();}catch(e){}}
    _FACTORY_DEFS[t]=defs;return defs;}
  catch(e){_FACTORY_DEFS[t]=null;return null;}}

function fmtVal(v){return Math.abs(v)>=100?Math.round(v):Math.abs(v)>=10?v.toFixed(1):v.toFixed(2);}
function makeKnob(obj,key,label,min,max,intMode,scale,autoKey){
  const wrap=document.createElement('div');wrap.className='knob';
  const dial=document.createElement('div');dial.className='dial';
  const ind=document.createElement('div');
  ind.style.cssText='position:absolute;width:2px;height:12px;background:var(--accent);left:50%;top:2px;transform-origin:50% 100%;z-index:2';
  dial.appendChild(ind);
  const lab=document.createElement('div');lab.className='kl';lab.textContent=label;
  const val=document.createElement('div');val.className='kv';
  wrap.appendChild(dial);wrap.appendChild(lab);wrap.appendChild(val);
  const norm=v=>scale==='log'?(Math.log(v/min)/Math.log(max/min)):(v-min)/(max-min);
  const denorm=t=>scale==='log'?min*Math.pow(max/min,t):min+(max-min)*t;
  const refresh=()=>{const v=obj.params[key];const t=clamp(norm(v),0,1);
    ind.style.transform=`translateX(-50%) rotate(${t*270-135}deg)`;
    if(!$('input',val))val.textContent=intMode?Math.round(v):fmtVal(v);};
  val.addEventListener('dblclick',e=>{e.stopPropagation();
    if($('input',val))return;
    const inp=document.createElement('input');inp.type='text';
    inp.value=intMode?Math.round(obj.params[key]):fmtVal(obj.params[key]);
    inp.style.cssText='width:34px;height:14px;font-size:8px;background:#111;border:1px solid var(--accent);color:#fff;text-align:center;outline:none;border-radius:2px';
    val.textContent='';val.appendChild(inp);inp.focus();inp.select();
    let done=false;
    const commit=()=>{if(done)return;done=true;
      const v=parseFloat(inp.value.replace(',','.'));
      if(!isNaN(v)){Undo.save();obj.params[key]=clamp(intMode?Math.round(v):v,min,max);if(obj.applyParams)obj.applyParams();}
      inp.remove();refresh();};
    const cancel=()=>{if(done)return;done=true;inp.remove();refresh();};
    inp.onblur=commit;
    inp.onkeydown=ev=>{if(ev.key==='Enter'){ev.preventDefault();commit();}
      else if(ev.key==='Escape'){ev.preventDefault();cancel();}};});
  if(!obj._knobDef)obj._knobDef={};
  if(!(key in obj._knobDef)){const fd=factoryDefaults(obj);
    obj._knobDef[key]=(fd&&key in fd)?fd[key]:obj.params[key];}
  const _def=obj._knobDef[key];
  refresh();
  wrap._knobRefresh=refresh;
  if(autoKey)wrap.dataset.autoKey=autoKey;
  let _mkUndo=true;
  dial.addEventListener('pointerdown',()=>{_mkUndo=true;});
  dblPress(dial,()=>{Undo.save();obj.params[key]=_def;if(obj.applyParams)obj.applyParams();refresh();});
  vDrag(dial,()=>clamp(norm(obj.params[key]),0,1),p=>{if(_mkUndo){_mkUndo=false;Undo.save();}
    p=clamp(p,0,1);let v=denorm(p);
    if(intMode)v=Math.round(v);obj.params[key]=v;if(obj.applyParams)obj.applyParams();refresh();},0.005);
  return wrap;
}

// describe a specific automation lane (cat+param) on a track
function laneDescriptor(tk,lane){
  if(!lane)return null;
  const mk=(id,label,min,max,scale,kind,def)=>{const lg=scale==='log';
    const norm=kind==='toggle'?(v=>clamp(v,0,1)):(v=>clamp(lg?Math.log(Math.max(min,v)/min)/Math.log(max/min):(v-min)/((max-min)||1),0,1));
    const denorm=kind==='toggle'?(p=>p>=0.5?1:0):(p=>lg?min*Math.pow(max/min,clamp(p,0,1)):min+(max-min)*clamp(p,0,1));
    return {id,label,min,max,scale,kind:kind||'continuous',step:kind==='toggle',def,norm,denorm};};
  if(lane.cat==='mixer'){
    if(lane.param==='volume'){const d=mk('mixer.volume','Track Volume',0,dbToGain(6),'lin','continuous',tk.volume);d.norm=volToPos;d.denorm=posToVol;return d;}
    if(lane.param==='pan')return mk('mixer.pan','Pan',-1,1,'lin','continuous',tk.pan);
    if(lane.param==='on')return mk('mixer.on','Track On/Off',0,1,'lin','toggle',tk.enabled?1:0);
    return null;
  }
  if(lane.cat&&lane.cat.indexOf('dev:')===0){const id=lane.cat.slice(4);const d=tk.devices.find(x=>x.id===id);if(!d)return null;
    if(lane.param==='on')return mk('dev.'+id+'.on',d.name+' On/Off',0,1,'lin','toggle',d.enabled?1:0);
    const p=devAutoList(d).find(x=>x.key===lane.param);if(!p)return null;
    return mk('dev.'+id+'.'+lane.param,d.name+' '+p.label,p.min,p.max,p.scale,'continuous',devAutoGet(d,lane.param));

}
function envValueAt(env,beat,def,step){
  if(!env||!env.length)return def;
  if(beat<=env[0].beat)return env[0].value;
  const last=env[env.length-1];if(beat>=last.beat)return last.value;
  if(step){let v=env[0].value;for(const p of env){if(p.beat<=beat)v=p.value;else break;}return v;}
  for(let i=0;i<env.length-1;i++){const a=env[i],b=env[i+1];
    if(beat>=a.beat&&beat<=b.beat){
      const t=clamp((beat-a.beat)/((b.beat-a.beat)||1),0,1);
      const c=a.curve||0;const s=c?Math.pow(t,Math.pow(2,-c*4)):t;
      return a.value+(b.value-a.value)*s;}}

}
function trackHasAuto(tk){return tk.automation&&Object.keys(tk.automation).some(k=>tk.automation[k]&&tk.automation[k].length);}
// is the pointer on a track's automation line or a breakpoint on a specific lane?
function autoHitTest(h){
  const tk=App.tracks[h.row];if(!tk||h.lane<0)return false;
  const lane=tk.autoLanes[h.lane];if(!lane)return false;
  const desc=laneDescriptor(tk,lane);if(!desc)return false;
  const env=tk.automation[desc.id]||[];const ppb=App.pxPerBeat;
  const lh=autoLaneH(tk,h.lane);
  const laneY=trackY(h.row)+ROWH+autoLaneY(tk,h.lane);
  const yTop=laneY+4,yBot=laneY+lh-4;
  for(const p of env){const px=p.beat*ppb,py=yBot-clamp(desc.norm(p.value),0,1)*(yBot-yTop);
    if(Math.hypot(px-h.x,py-h.y)<8)return true;}
  const val=env.length?envValueAt(env,h.beat,desc.def,desc.step):desc.def;
  const y=yBot-clamp(desc.norm(val),0,1)*(yBot-yTop);

}
// evaluate every track's envelopes at `beat` and push to live audio params
function applyAutomation(beat){
  if(!engine.ctx)return;const ctx=engine.ctx,solo=engine.anySolo();
  App.tracks.forEach(tk=>{const A=tk.automation;if(!A)return;
    const volEnv=A['mixer.volume'],panEnv=A['mixer.pan'],onEnv=A['mixer.on'];
    const enabledA=(onEnv&&onEnv.length)?(envValueAt(onEnv,beat,tk.enabled?1:0,true)>=0.5):tk.enabled;
    const aud=!tk.mute&&enabledA&&(!solo||tk.solo);
    if((volEnv&&volEnv.length)||(onEnv&&onEnv.length)){
      const g=(volEnv&&volEnv.length)?envValueAt(volEnv,beat,tk.volume,false):tk.volume;
      tk.volGain.gain.setTargetAtTime(aud?g:0,ctx.currentTime,0.01);}
    if(panEnv&&panEnv.length)tk.panner.pan.setTargetAtTime(clamp(envValueAt(panEnv,beat,tk.pan,false),-1,1),ctx.currentTime,0.01);
    tk.devices.forEach(d=>{
      const oe=A['dev.'+d.id+'.on'];
      if(oe&&oe.length){const want=envValueAt(oe,beat,d.enabled?1:0,true)>=0.5;
        if(want!==d.enabled){d.enabled=want;tk.rebuildChain();}}
      devAutoList(d).forEach(p=>{const fk='dev.'+d.id+'.'+p.key;
        let v=devAutoGet(d,p.key);
        const pe=A[fk];
        if(pe&&pe.length)v=envValueAt(pe,beat,v,false);
        devAutoSet(d,p.key,v);});
    });
  });
}
// when playback stops, revert every (possibly automated) param to its manual value
function restoreManualState(){
  if(!engine.ctx)return;
  App.tracks.forEach(tk=>{
    if(tk._manualOn!==undefined&&tk._manualOn!==tk.enabled){tk.enabled=tk._manualOn;}
    tk.devices.forEach(d=>{
      if(d._manualOn!==undefined&&d._manualOn!==d.enabled){d.enabled=d._manualOn;tk.rebuildChain();}
      if(d.applyParams)d.applyParams();
    });
    tk.setPan(tk.pan);
  });
  engine.updateMuteStates();
}
// snapshot manual on/off baselines right before playback (so restore is exact)
function snapshotManual(){App.tracks.forEach(tk=>{tk._manualOn=tk.enabled;tk.devices.forEach(d=>d._manualOn=d.enabled);});}
// remove every automation point inside the selected region (all parameters of the affected tracks)
function clearAutomationRange(){
  if(!ARR.range||ARR.range.end===undefined)return;
  const s=Math.min(ARR.range.start,ARR.range.end),en=Math.max(ARR.range.start,ARR.range.end);
  const rows=ARR.range.row!=null?[ARR.range.row]:App.tracks.map((_,i)=>i);
  let removed=0;
  rows.forEach(ti=>{const tk=App.tracks[ti];if(!tk||!tk.automation)return;
    Object.keys(tk.automation).forEach(k=>{const env=tk.automation[k];if(!env)return;
      const kept=env.filter(p=>{if(p.beat>=s&&p.beat<=en){removed++;return false;}return true;});
      if(kept.length)tk.automation[k]=kept;else delete tk.automation[k];});});
  if(removed)toast('Automation removed ('+removed+' points)');}

// global preview state
const Preview={src:null,_sampleKey:null,_btnCE:null,_gen:0,
  stop(){this._gen++;

  play(buf,gain,startSec,durSec,onEnd,loopStartSec,loopEndSec){

/* track drag reorder via pointer events */
let _trkDrag=null;
let _trkDropInd=null;
function finishTrkDrag(commit){
  const d=_trkDrag;if(!d)return;
  if(d.ghost){d.ghost.remove();d.ghost=null;}
  if(_trkDropInd)_trkDropInd.style.display='none';
  $$('.strip-wrap').forEach(w=>w.style.opacity='');
  if(commit&&d.srcIdx>=0){
    const list=$$('.strip-wrap');
    let insertIdx=list.length;
    for(let j=0;j<list.length;j++){const r=list[j].getBoundingClientRect();
      if(d.lastY<r.top+r.height/2){insertIdx=j;break;}}
    if(insertIdx!==d.srcIdx&&insertIdx!==d.srcIdx+1){
      const moving=App.tracks.splice(d.srcIdx,1)[0];
      const targetIdx=insertIdx>d.srcIdx?insertIdx-1:insertIdx;
      App.tracks.splice(targetIdx,0,moving);
      engine.tracks=App.tracks;
      App.sel=clamp(App.sel,0,App.tracks.length-1);
      App.selClip=null;
      engine.updateMuteStates();

}
function setupStripDrag(){const strips=$('#strips');if(strips._dragWired)return;strips._dragWired=true;
  strips.addEventListener('pointerdown',e=>{
    const h=e.target.closest('.drag-handle');if(!h)return;
    const w=h.closest('.strip-wrap');if(!w)return;
    _trkDrag={srcIdx:parseInt(w.dataset.tk),lastY:e.clientY,ghost:null,started:false,
      startY:e.clientY,startX:e.clientX};
    w.setPointerCapture(e.pointerId);

  });
  document.addEventListener('pointermove',e=>{
    const d=_trkDrag;if(!d)return;
    const dy=Math.abs(e.clientY-d.startY),dx=Math.abs(e.clientX-d.startX);
    if(!d.started){
      if(dy<6&&dx<6)return;
      d.started=true;
      // create ghost element
      const w=$$('.strip-wrap')[d.srcIdx];if(!w)return finishTrkDrag(false);
      w.style.opacity='0.35';
      d.ghost=w.cloneNode(true);
      d.ghost.style.cssText='position:fixed;width:'+w.offsetWidth+'px;z-index:9999;pointer-events:none;opacity:0.85;transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.6);border-radius:4px;overflow:hidden';
      d.ghost.style.left=(e.clientX-16)+'px';d.ghost.style.top=(e.clientY-8)+'px';
      document.body.appendChild(d.ghost);
      return;
    }
    // position ghost
    if(d.ghost){d.ghost.style.left=(e.clientX-16)+'px';d.ghost.style.top=(e.clientY-8)+'px';}
    // update drop indicator
    d.lastY=e.clientY;
    const dropInd=_trkDropInd;const list=$$('.strip-wrap');if(!list.length||!dropInd)return;
    let insertIdx=list.length;
    for(let j=0;j<list.length;j++){const r=list[j].getBoundingClientRect();
      if(e.clientY<r.top+r.height/2){insertIdx=j;break;}}
    const src=d.srcIdx;

    dropInd.style.display='block';
    if(insertIdx>=list.length&&list.length){strips.insertBefore(dropInd,list[list.length-1].nextSibling);}

    else{strips.insertBefore(dropInd,list[insertIdx]);}
