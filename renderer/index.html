/* handle mapping mode clicks — when a modulator has Map armed,
   clicking any knob (device or another modulator) creates the map */
function wireMappingClicks(){
  const pane=$('#devPane');
  pane.addEventListener('pointerdown',e=>{
    const ti=App.sel;const tk=App.tracks[ti];
    if(!tk||!tk.modulators)return;
    const mapMod=tk.modulators.find(m=>m._mappingMode&&m.enabled);
    if(!mapMod)return;
    const knob=e.target.closest('.knob[data-auto-key]');
    if(!knob)return;
    const card=knob.closest('.devCard');if(!card)return;
    const devId=card.dataset.devId;
    const modId=card.dataset.modId;
    const ak=knob.dataset.autoKey;
    if(!ak)return;
    let targetKey='';
    if(devId)targetKey='dev.'+devId+'.'+ak;
    else if(modId){if(mapMod.id===modId)return;/* can't map self */ targetKey='mod.'+modId+'.'+ak;}
    if(!targetKey)return;
    e.preventDefault();e.stopPropagation();
    mapMod._mappingMode=false;
    const label=modTargetLabel(tk,targetKey);
    const existing=mapMod._maps.find(mp=>mp.targetKey===targetKey);
    if(existing){toast('Уже привязано: '+label);}
    else{Undo.save();mapMod._maps.push({targetKey,depth:0.5,targetLabel:label});toast(mapMod.name+' → '+label);}
    updateModOverlays();showDevices(ti);},true);
}
/* green overlays on mapped knobs + highlight of available targets while Map is armed */
function updateModOverlays(){
  const pane=$('#devPane');if(!pane)return;
  const ti=App.sel;const tk=App.tracks[ti];
  const mapped=new Set();let mapMod=null;
  if(tk&&tk.modulators)tk.modulators.forEach(m=>{
    if(m._mappingMode&&m.enabled)mapMod=m;
    if(!m.enabled)return;
    (m._maps||[]).forEach(mp=>{if(mp.targetKey)mapped.add(mp.targetKey);});});
  pane.querySelectorAll('.knob[data-auto-key]').forEach(k=>{
    const card=k.closest('.devCard');if(!card)return;
    const ak=k.dataset.autoKey;
    let key='';
    if(card.dataset.devId)key='dev.'+card.dataset.devId+'.'+ak;
    else if(card.dataset.modId)key='mod.'+card.dataset.modId+'.'+ak;
    if(!key)return;
    const dial=k.querySelector('.dial');if(!dial)return;
    let ov=k.querySelector('.modOv');
    if(mapped.has(key)){
      if(!ov){ov=document.createElement('div');ov.className='modOv';dial.appendChild(ov);}
      ov.style.display='';}
    else if(ov)ov.style.display='none';
    const own=mapMod&&card.dataset.modId===mapMod.id;
    dial.classList.toggle('mapHL',!!mapMod&&!own);});
}

/* =======================================================================
   RENDER LOOP
   ======================================================================= */
let _mbuf;
function renderLoop(){requestAnimationFrame(renderLoop);if(!engine.ctx)return;
  const b=Math.max(0,engine.nowBeat());
  if(engine.state!=='STOPPED')applyAutomation(b);
  const bar=Math.floor(b/4)+1,beat=Math.floor(b%4)+1,six=Math.floor((b*4)%4)+1;
  $('#position').textContent=`${bar}.${beat}.${six}`;
  if(!_mbuf)_mbuf=new Uint8Array(engine.masterAnalyser.fftSize);
  engine.masterAnalyser.getByteTimeDomainData(_mbuf);
  let mp=0;for(let i=0;i<_mbuf.length;i++){const v=Math.abs(_mbuf[i]-128)/128;if(v>mp)mp=v;}
  const mstVuI=$('#masterStripVu i');if(mstVuI){mstVuI.style.height=(mp*100)+'%';
    mstVuI.style.background=mp>0.9?'var(--vu-r)':mp>0.6?'var(--vu-y)':'var(--vu-g)';}
  App.tracks.forEach(tk=>{const vu=tk.readVu();if(tk._vuEl){tk._vuEl.style.height=(vu*100)+'%';
    tk._vuEl.style.background=vu>0.9?'var(--vu-r)':vu>0.6?'var(--vu-y)':'var(--vu-g)';}
    // live-reflect automated volume/pan on the strip so faders track the envelope
    if(engine.state!=='STOPPED'){const A=tk.automation;
      const ve=A&&A['mixer.volume'];if(ve&&ve.length&&tk._volFill){const g=envValueAt(ve,b,tk.volume,false);
        const p=volToPos(g);tk._volFill.style.width=(p*100)+'%';tk._volKnob.style.left=`calc(${p*100}% - 3px)`;
        if(tk._db)tk._db.textContent=fmtDb(g);}
      const pe=A&&A['mixer.pan'];if(pe&&pe.length&&tk._panKnob){const pv=clamp(envValueAt(pe,b,tk.pan,false),-1,1);
        tk._panKnob.style.left=`calc(${(pv+1)/2*100}% - 3px)`;if(tk._panVal)tk._panVal.textContent=pv===0?'C':(pv<0?'':'+')+pv.toFixed(1);}}
  });
  // modulators run every frame (also while stopped)
  runModulators(performance.now());
  // visible device cards tick (EQ spectrum / comp meter) + mod overlays
  if($('#devPane').classList.contains('on')){
    const ti=App.sel;const tk=App.tracks[ti];
    if(tk)tk.devices.forEach(d=>d.tick&&d.tick());
    App.masterDevices.forEach(d=>d.tick&&d.tick());
    // modulators: animate waveform canvas
    if(tk&&tk.modulators)tk.modulators.forEach(m=>{if(m._drawWave)m._drawWave();});
    updateModOverlays();
    // animate knob indicators to follow automation during playback
    const _modsLive=tk&&tk.modulators&&tk.modulators.some(m=>m.enabled&&m._maps&&m._maps.some(mp=>mp.targetKey));
    if(engine.state!=='STOPPED'||_modsLive){$('#devPane').querySelectorAll('.knob').forEach(k=>{if(k._knobRefresh)k._knobRefresh();});}}
  // the playhead only moves while playing — redraw the arrangement just then.
  // While stopped, edits call drawArr() themselves, so we avoid 60 idle redraws/sec.
  if(engine.state!=='STOPPED'){drawArr();renderLoop._wasPlaying=true;}
  else if(renderLoop._wasPlaying){renderLoop._wasPlaying=false;buildStrips();drawArr();}
  // animate clip editor playhead during playback
  if(engine.state!=='STOPPED'&&CE.clip)drawCE();
}

function arrDuplicate(){
  Undo.save();
  const hasRange=ARR.range&&ARR.range.end!==undefined;
  const rangeS=hasRange?Math.min(ARR.range.start,ARR.range.end):null;
  const rangeE=hasRange?Math.max(ARR.range.start,ARR.range.end):null;
  const slices=[];
  if(hasRange){
    // collect parts of ALL clips that intersect the range (on the range's track, or all tracks if no row)
    const tracksToScan=ARR.range.row!=null?[{t:App.tracks[ARR.range.row],ti:ARR.range.row}]
      :App.tracks.map((t,ti)=>({t,ti}));
    tracksToScan.forEach(({t,ti})=>{
      t.clips.forEach(c=>{
        const cs=c.startBeat,ce=c.startBeat+c.length,span=c.end-c.start;
        const s=Math.max(cs,rangeS),e=Math.min(ce,rangeE);
        if(e<=s)return;

        slices.push({ti,startBeat:s,length:e-s,
          clip:{...c,start:c.start+span*fracS,end:c.start+span*fracE}});});});
  }else{
    // no range — duplicate selected clips whole
    arrSelClips().forEach(({c,ti})=>slices.push({ti,startBeat:c.startBeat,length:c.length,clip:c}));}
  if(!slices.length){toast('Nothing to duplicate');return;}
  // bounding box
  let selStart=Infinity,selEnd=-Infinity;
  slices.forEach(sl=>{selStart=Math.min(selStart,sl.startBeat);selEnd=Math.max(selEnd,sl.startBeat+sl.length);});
  const pasteStart=snapBeat(selEnd),pasteEnd=pasteStart+(selEnd-selStart);
  // trim paste zone on affected tracks
  const affectedTracks=new Set(slices.map(sl=>sl.ti));
  affectedTracks.forEach(ti=>{
    const t=App.tracks[ti];const result=[];
    t.clips.forEach(c=>{
      const cs=c.startBeat,ce=c.startBeat+c.length,span=c.end-c.start;
      if(ce<=pasteStart||cs>=pasteEnd){result.push(c);return;}
      if(cs<pasteStart){const frac=(pasteStart-cs)/c.length;

    });t.clips=result;});

  slices.forEach(({ti,startBeat,length,clip})=>{

    App.tracks[ti].clips.push(n);made.push(n.id);});

    clip.stretch.markers.forEach((m,i)=>{
      const mx=beatToX(m.outputBeat);
      if(mx<0||mx>W)return;
      const isFirstLast=i===0||i===clip.stretch.markers.length-1;
      const col=isFirstLast?'#ffa94d':'#ff7a45';
      const aw=6,ah=34,lane=LS+RU;
      g.strokeStyle=col;g.lineWidth=1;
      g.setLineDash(isFirstLast?[4,4]:[]);
      g.beginPath();g.moveTo(mx,lane+ah);g.lineTo(mx,H);g.stroke();
      g.setLineDash([]);
      g.strokeStyle=col;g.lineWidth=1.5;g.lineJoin='round';
      g.beginPath();g.moveTo(mx-aw,lane);g.lineTo(mx+aw,lane);g.lineTo(mx+aw,lane+18);g.lineTo(mx,lane+ah);g.lineTo(mx-aw,lane+18);g.closePath();g.stroke();
      g.fillStyle='#fac867';
      g.beginPath();g.moveTo(mx-aw,lane);g.lineTo(mx+aw,lane);g.lineTo(mx+aw,lane+18);g.lineTo(mx-aw,lane+18);g.closePath();g.fill();
      g.fillStyle='#c0c6c7';
      g.beginPath();g.moveTo(mx-aw,lane+18);g.lineTo(mx+aw,lane+18);g.lineTo(mx,lane+ah);g.closePath();g.fill();});};
  // transient markers — gray small triangles
  if(typeof BPM_CACHE!=='undefined'){
    const tInfo=ceTransientInfo(clip);
    if(tInfo.length){
      const lane=wfTop;
      const hasMarks=clip.stretch?.enabled&&clip.stretch.markers&&clip.stretch.markers.length;
      for(const t of tInfo){
        if(hasMarks&&clip.stretch.markers.some(m=>Math.abs(m.outputBeat-t.cb)<0.001))continue;
        const x=beatToX(t.cb);
        if(x<-8||x>W+8)continue;
        g.fillStyle='#999';
        g.beginPath();g.moveTo(x,lane+8);g.lineTo(x-5,lane);g.lineTo(x+5,lane);g.closePath();g.fill();
        g.strokeStyle='#999';g.lineWidth=1;
        g.beginPath();g.moveTo(x+.5,lane+8);g.lineTo(x+.5,H);g.stroke();}}}
  // ---- arrangement playhead cursor (when the main transport plays through this clip)
  if(engine.state!=='STOPPED'&&clip){
    const arrBeat=engine.nowBeat();
    const _visBeats=clip.loopEnabledExt&&clip.visualDurExt?(clip.visualDurExt/engine.secPerBeat):clip.length;
    const cs=clip.startBeat,ce=cs+_visBeats;
    if(arrBeat>=cs&&arrBeat<=ce){
      let clipLocalBeat=arrBeat-cs;
      if(clip.loopOn&&clip.loopEnd>clip.loopStart){
        const bufBeat=clip.start*bb+clipLocalBeat;
        if(bufBeat>=clip.loopEnd){
          const loopLen=clip.loopEnd-clip.loopStart;
          clipLocalBeat=clip.loopStart+((bufBeat-clip.loopStart)%loopLen)-clip.start*bb;
        }else if(bufBeat<clip.loopStart){
          clipLocalBeat=clip.loopStart-clip.start*bb;
        }
      }
      const useWarp=clip.stretch?.enabled&&clip.stretch?.markers?.length;
      const _origLen=clip.origLenBeats||clip.length;
      if(clip.loopEnabledExt&&clipLocalBeat>=_origLen&&clip.loopLenExt>0){
        const loopStartSec=clip.loopStartExt||0;
        const loopLenSec=clip.loopLenExt;
        const bufDur=clip.buffer?clip.buffer.duration:1;
        const spb=engine.secPerBeat;
        const offSec=(clipLocalBeat-_origLen)*spb;
        const wrappedSec=loopStartSec+(offSec%loopLenSec);
        const bufFrac=wrappedSec/bufDur;
        const x=beatToX(bufFrac*bb);
        if(x>=0&&x<=W){
          g.strokeStyle='#ffcc00';g.lineWidth=2;
          g.beginPath();g.moveTo(x,LS+RU);g.lineTo(x,H);g.stroke();}
      }else{
        const inputBeat=useWarp?clipOutputBeatToInputBeat(clip,clamp(clipLocalBeat,0,_origLen)):clipLocalBeat;
        const inputLen=useWarp?_origLen:clip.length;
        const bufferFrac=clip.start+(clamp(inputBeat,0,inputLen)/inputLen)*(clip.end-clip.start);
        const x=beatToX(bufferFrac*bb);
      if(x>=0&&x<=W){
        g.save();
        g.strokeStyle='#ffdd00';g.lineWidth=2;g.globalAlpha=0.9;
        g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();
        g.globalAlpha=0.3;
        g.fillStyle='#ffdd00';g.fillRect(x-1,0,3,H);
        g.restore();}}}}
}

function rebuildMasterChain(){
  try{engine.masterInput.disconnect();}catch(e){}
  let node=engine.masterInput;
  App.masterDevices.forEach(d=>{try{d.output.disconnect();}catch(e){}
    if(d.enabled){node.connect(d.input);node=d.output;}});
  node.connect(engine.master);}

function showDevices(ti){switchBottom('dev');
  $('#tabDevices').classList.add('on');$('#tabClip').classList.remove('on');
  App.selClip=null;
  const isMaster=ti===-1||ti==='master';
  const prevTrack=App.selTrack;
  App.selTrack=isMaster?-1:ti;
  if(prevTrack!==App.selTrack)App.selDevice=null;
  const tk=isMaster?null:App.tracks[ti];
  $('#bottomTitle').textContent='Device Chain — '+(isMaster?'MASTER':tk.name);
  const pane=$('#devPane');pane.innerHTML='';
  const devs=isMaster?App.masterDevices:(tk?tk.devices:[]);
  const mods=isMaster?[]:(tk?tk.modulators:[]);
  pane.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move';};
  pane.ondrop=e=>{e.preventDefault();ensureAudio();Undo.save();
    const moveRaw=e.dataTransfer.getData('x-device-move');
    const isCopy=e.altKey;
    if(moveRaw){const data=JSON.parse(moveRaw);
      if(isCopy){const d=Undo.copyDeviceById(data.id,isMaster?null:tk,App.selDevice);if(d){App.selDevice=d.id;buildStrips();showDevices(ti);toast('Device copied');}}
      else{const d=moveDeviceById(data.id,isMaster?null:tk,App.selDevice);if(d){App.selDevice=d.id;buildStrips();showDevices(ti);toast('Device moved');}}
      return;}
    const modMoveRaw=e.dataTransfer.getData('x-modulator-move');
    if(modMoveRaw&&!isMaster&&tk){const data=JSON.parse(modMoveRaw);const m=moveModulatorById(data.id,tk);if(m){App.selDevice=m.id;buildStrips();showDevices(ti);toast('Modulator moved');}return;}
    let modType='';const pt=e.dataTransfer.getData('text/plain');
    if(pt&&pt.startsWith('mod:'))modType=pt.slice(4);
    if(!modType&&_dragModType){modType=_dragModType;_dragModType='';}
    if(modType&&!isMaster&&tk&&MODULATORS[modType]){const m=tk.addModulator(modType);if(m){buildStrips();showDevices(ti);toast(modType+' → '+tk.name);}return;}
    const dt=e.dataTransfer.getData('x-device');if(!dt)return;
    const dev=isMaster?(()=>{const Cls=DEVICES[dt];if(!Cls)return null;const d=new Cls(engine.ctx);App.masterDevices.push(d);rebuildMasterChain();return d;})():tk.addDevice(dt);
    if(dev){buildStrips();showDevices(ti);}};
  // empty state
  if(!devs.length&&!mods.length){pane.innerHTML+='<div class="devEmpty" style="width:100%;display:flex;align-items:center;justify-content:center;height:100%;color:var(--txt-dim);font-size:12px">No devices. Drop a device from the browser here.</div>';
    if(!App.selDevice)App.selDevice=null;return;}
  const chain=document.createElement('div');chain.className='devChain';
  // flat chain: modulators and devices interleaved via _chainOrder
  if(!isMaster&&tk&&!tk._chainOrder){
    tk._chainOrder=[];
    mods.forEach(m=>tk._chainOrder.push({kind:'mod',id:m.id}));
    devs.forEach(d=>tk._chainOrder.push({kind:'dev',id:d.id}));}
  let chainItems;
  if(!isMaster&&tk&&tk._chainOrder){
    chainItems=[];
    tk._chainOrder.forEach(e=>{
      if(e.kind==='mod'){const m=tk.modulators.find(x=>x.id===e.id);if(m)chainItems.push({kind:'mod',item:m});}
      else{const d=tk.devices.find(x=>x.id===e.id);if(d)chainItems.push({kind:'dev',item:d});}});}
  else{
    chainItems=[];
    mods.forEach(m=>chainItems.push({kind:'mod',item:m}));
    devs.forEach(d=>chainItems.push({kind:'dev',item:d}));}
  const selId=App.selDevice;
  chainItems.forEach((ci,j)=>{const isMod=ci.kind==='mod';const m=ci.item;
    const card=document.createElement('div');
    const coll=isMod?m._collapsed:m._collapsed;
    card.className='devCard'+(m.id===selId?' sel':'')+(coll?' collapsed':'');
    if(isMod)card.style.borderColor='#8b5cf6';
    if(!coll&&isMod){card.style.minWidth='225px';card.style.maxWidth='250px';}
    else if(!coll){card.style.minWidth='';card.style.maxWidth='';}
    else{card.style.minWidth='';card.style.maxWidth='';}
    if(isMod)card.dataset.modId=m.id;else card.dataset.devId=m.id;
    card.dataset.chainIdx=j;
    const hd=document.createElement('div');hd.className='hd';
    const nameStyle=isMod?' style="color:#8b5cf6"':'';
    const dragDataType=isMod?'x-modulator-move':'x-device-move';
    const dragData=isMod?JSON.stringify({id:m.id}):JSON.stringify({id:m.id,isMaster});
    hd.innerHTML=`<span class="devDrag" draggable="true" title="Drag to move to another track">⠿</span><b${nameStyle}>${m.name}</b><button class="pwr ${m.enabled?'on':''}">⏻</button>`;
    $('.pwr',hd).onclick=e=>{e.stopPropagation();Undo.save();m.enabled=!m.enabled;if(!isMod&&isMaster)rebuildMasterChain();else if(!isMod&&tk)tk.rebuildChain();showDevices(ti);};
    // HTML5 drag for cross-track move
    const dragEl=$('.devDrag',hd);
    dragEl.addEventListener('dragstart',e=>{
      e.stopPropagation();
      e.dataTransfer.setData(dragDataType,dragData);
      e.dataTransfer.effectAllowed='move';
    });
    // dblclick to collapse
    dblPress(hd,e=>{if(e.target.tagName==='BUTTON'||e.target.closest('.devDrag'))return;
      Undo.save();m._collapsed=!m._collapsed;showDevices(ti);});
    card.appendChild(hd);
    const body=document.createElement('div');body.style.cssText=isMod?'display:flex;flex-direction:column;flex:1;min-height:0':'display:flex;flex:1';
    m.buildUI(body);
    card.appendChild(body);
    // automation indicator for devices
    if(!isMod&&!isMaster&&tk){const d=m;const autoKeys=devAutoList(d).map(p=>p.key).filter(k=>{const fk='dev.'+d.id+'.'+k;return tk.automation[fk]&&tk.automation[fk].length;});
      if(autoKeys.length){body.querySelectorAll('.knob').forEach(k=>{if(k.dataset.autoKey&&autoKeys.includes(k.dataset.autoKey)&&!k.querySelector('.autoDot')){const dot=document.createElement('div');dot.className='autoDot';k.appendChild(dot);}});}}
    // click to select
    card.onclick=e=>{if(e.target.closest('select,button,input,textarea,span.devDrag'))return;
      if(App.selDevice===m.id)return;
      App.selDevice=m.id;
      chain.querySelectorAll('.devCard').forEach(c=>c.classList.remove('sel'));
      card.classList.add('sel');};
    // drag to reorder within same track (pointer events on header)
    hd.addEventListener('pointerdown',e=>{if(e.target.tagName==='BUTTON'||e.target.closest('.devDrag'))return;
      e.preventDefault();card.style.zIndex='99';
      const sx=e.clientX,itemIdx=j;
      const mv=ev=>{const dx=ev.clientX-sx;card.style.transform='translateX('+dx+'px)';card.style.opacity='0.7';};
      const up=ev=>{document.removeEventListener('pointermove',mv);document.removeEventListener('pointerup',up);
        card.style.transform='';card.style.opacity='';card.style.zIndex='';
        const allCards=chain.querySelectorAll('.devCard');
        let targetIdx=-1;
        for(let k=0;k<allCards.length;k++){if(ev.clientX<allCards[k].getBoundingClientRect().left+allCards[k].offsetWidth/2){targetIdx=k;break;}}
        if(targetIdx===-1)targetIdx=allCards.length;
        if(targetIdx!==itemIdx){
          Undo.save();
          if(targetIdx===itemIdx+1){
            // swap adjacent (one position right)
            const tmp=chainItems[itemIdx];
            chainItems[itemIdx]=chainItems[itemIdx+1];
            chainItems[itemIdx+1]=tmp;
          }else{
            const moving=chainItems.splice(itemIdx,1)[0];
            const insert=targetIdx>itemIdx?targetIdx-1:targetIdx;
            chainItems.splice(insert,0,moving);
          }
          // write back to track arrays
          if(isMaster){App.masterDevices=chainItems.filter(x=>x.kind==='dev').map(x=>x.item);
            rebuildMasterChain();}
          else if(tk){tk.modulators=chainItems.filter(x=>x.kind==='mod').map(x=>x.item);
            tk.devices=chainItems.filter(x=>x.kind==='dev').map(x=>x.item);
            tk._chainOrder=chainItems.map(x=>({kind:x.kind,id:x.item.id}));
            tk.rebuildChain();}
          showDevices(ti);}};
      document.addEventListener('pointermove',mv);document.addEventListener('pointerup',up);});
    chain.appendChild(card);});
  pane.appendChild(chain);
}

  $(which==='dev'?'#devPane':'#clipPane').classList.add('on');}

/* move a device (by ID) to a target track or master — preserves automation */
function moveDeviceById(id, targetTk, insertAfterId){
  let srcTk=null,srcIsMaster=false,srcIdx=-1;
  for(let i=0;i<App.tracks.length;i++){const idx=App.tracks[i].devices.findIndex(d=>d.id===id);
    if(idx>=0){srcTk=App.tracks[i];srcIdx=idx;break;}}
  if(srcIdx<0){srcIdx=App.masterDevices.findIndex(d=>d.id===id);
    if(srcIdx<0){toast('Device not found');return null;}
    srcIsMaster=true;}
  const d=srcIsMaster?App.masterDevices[srcIdx]:srcTk.devices[srcIdx];
  // remove from source
  if(srcIsMaster)App.masterDevices.splice(srcIdx,1);
  else srcTk.devices.splice(srcIdx,1);
  // move automation + lanes from source track to target (if different)
  if(srcTk&&targetTk&&srcTk!==targetTk){
    Object.keys(srcTk.automation).forEach(k=>{if(k.startsWith('dev.'+id+'.')){targetTk.automation[k]=(srcTk.automation[k]||[]).map(pt=>({...pt}));delete srcTk.automation[k];}});
    srcTk.autoLanes=srcTk.autoLanes.filter(l=>!(l.cat==='dev:'+id));
    if(srcTk._chainOrder)srcTk._chainOrder=srcTk._chainOrder.filter(e=>!(e.kind==='dev'&&e.id===id));}
  if(targetTk&&targetTk!==srcTk){if(!targetTk._chainOrder)targetTk._chainOrder=[];
    targetTk._chainOrder.push({kind:'dev',id:d.id});}
  // insert into target
  const tDevs=targetTk?targetTk.devices:App.masterDevices;
  if(insertAfterId){const idx=tDevs.findIndex(dd=>dd.id===insertAfterId);
    if(idx>=0)tDevs.splice(idx+1,0,d);else tDevs.push(d);}
  else tDevs.push(d);
  // rebuild chains
  if(srcIsMaster)rebuildMasterChain();else if(srcTk)srcTk.rebuildChain();
  if(targetTk!==srcTk){if(targetTk)targetTk.rebuildChain();else rebuildMasterChain();}
  return d;
}
/* move a modulator (by ID) to a target track */
function moveModulatorById(id, targetTk){
  let srcTk=null,srcIdx=-1;
  for(let i=0;i<App.tracks.length;i++){const idx=App.tracks[i].modulators.findIndex(m=>m.id===id);
    if(idx>=0){srcTk=App.tracks[i];srcIdx=idx;break;}}
  if(srcIdx<0){toast('Modulator not found');return null;}
  const m=srcTk.modulators[srcIdx];
  // remove from source
  srcTk.modulators.splice(srcIdx,1);
  if(srcTk._chainOrder)srcTk._chainOrder=srcTk._chainOrder.filter(e=>!(e.kind==='mod'&&e.id===id));
  // insert into target
  targetTk.modulators.push(m);
  if(!targetTk._chainOrder)targetTk._chainOrder=[];
  targetTk._chainOrder.push({kind:'mod',id:m.id});
  return m;
}

function updateTransportUI(){$('#btnPlay').classList.toggle('on',engine.state==='PLAYING');
  $('#btnRec').classList.toggle('on',engine.state==='RECORDING');$('#btnMetro').classList.toggle('on',engine.metroOn);
  $('#btnLoop').classList.toggle('on',engine.loopOn);}
function wireTransport(){
  $('#btnPlay').onclick=()=>{ensureAudio();if(engine.state!=='STOPPED')engine.stop();engine.play();updateTransportUI();};
  $('#btnStop').onclick=()=>{if(engine.state==='STOPPED'){engine._cursor=0;drawArr();}else engine.stop();updateTransportUI();};
  $('#btnRec').onclick=()=>{ensureAudio();if(engine.state==='RECORDING')engine.stop();else{engine.stop();engine.play(true);}updateTransportUI();};
  $('#btnMetro').onclick=()=>{ensureAudio();engine.metroOn=!engine.metroOn;updateTransportUI();};
  $('#btnLoop').onclick=()=>{engine.loopOn=!engine.loopOn;updateTransportUI();
    if(engine.loopOn){
      if(ARR.loop){engine.loopStart=ARR.loop.start;engine.loopEnd=ARR.loop.end;}
      else{ARR.loop={start:0,end:4};engine.loopStart=0;engine.loopEnd=4;}
      engine._cursor=engine.loopStart;}
    drawArr();};
  const bpmBox=$('#bpmBox'),bpmDisp=$('#bpmDisplay');
  const updateBpmDisp=()=>bpmDisp.textContent=engine.bpm.toFixed(2);
  function recalcAutoBpmClips(){App.tracks.forEach(t=>t.clips.forEach(c=>{if(c.buffer)clipLenFromBpm(c);}));}
  // vertical drag (no preventDefault to allow dblclick)
  let _bpmDrag=false;
  bpmBox.addEventListener('pointerdown',e=>{_bpmDrag=false;const sy=e.clientY,sv=engine.bpm;
    const mv=ev=>{_bpmDrag=true;engine.setBpm(sv+(sy-ev.clientY)*0.3);updateBpmDisp();};
    const up=()=>{bpmBox.removeEventListener('pointermove',mv);bpmBox.removeEventListener('pointerup',up);recalcAutoBpmClips();drawArr();};
    bpmBox.addEventListener('pointermove',mv);bpmBox.addEventListener('pointerup',up);});
  bpmBox.addEventListener('dblclick',e=>{if($('input',bpmBox))return;

    inp.style.cssText='width:52px;height:22px;text-align:center;font-size:13px;font-weight:700;padding:0 2px;background:#111;border:1px solid var(--accent);color:#fff;outline:none;border-radius:2px';
    bpmDisp.style.display='none';bpmBox.insertBefore(inp,bpmDisp.nextSibling);inp.focus();inp.select();
    let done=false;
    const commit=()=>{if(done)return;done=true;const v=parseFloat(inp.value.replace(',','.'));if(!isNaN(v)&&v>0){engine.setBpm(v);recalcAutoBpmClips();drawArr();}inp.remove();bpmDisp.style.display='';updateBpmDisp();};
    const cancel=()=>{if(done)return;done=true;inp.remove();bpmDisp.style.display='';};
    inp.onblur=commit;inp.onkeydown=ev=>{if(ev.key==='Enter'){ev.preventDefault();commit();}

  $('#quantSel').onchange=e=>{

  $('#addTrack').onclick=()=>{Undo.save();ensureAudio();App.tracks.push(new Track(engine,App.tracks.length));
    engine.tracks=App.tracks;buildStrips();drawArr();};
  // bottom tabs
  const tabDev=$('#tabDevices'),tabClip=$('#tabClip');
  tabDev.onclick=()=>{
    tabDev.classList.add('on');tabClip.classList.remove('on');

    if(!App.lastClip){toast('No clip selected');return;}
    tabDev.classList.remove('on');tabClip.classList.add('on');
    const ti=App.tracks.indexOf(App.tracks.find(t=>t.clips.includes(App.lastClip)));
    openClipEditor(App.lastClip,ti>=0?ti:App.sel);};

  const fileMenu=$('#fileMenu');

  document.addEventListener('click',e=>{if(!fileMenu.contains(e.target))hideMenu();});

  $('#menuSave').onclick=e=>{e.stopPropagation();hideMenu();saveProject();};
  $('#menuLoad').onclick=e=>{e.stopPropagation();hideMenu();$('#projectInput').click();};
  $('#menuExport').onclick=e=>{e.stopPropagation();hideMenu();exportMaster();};

        const files=await window.RawCore.openAudioFiles();
        if(files&&files.length)addSamplesFromFiles(files.map(f=>({name:f.name,arrayBuffer:()=>Promise.resolve(f.data)})));
      }catch(e){toast('File dialog error: '+e.message);console.error(e);}
    }else{
      const inp=$('#sampleInput');if(inp)inp.click();else toast('Error: file input not found');
    }
  };

  $$('.bCollapse').forEach(btn=>btn.onclick=function(e){e.stopPropagation();

    $('.bCollapse',sec).textContent=sec.classList.contains('collapsed')?'+':'−';});

function wireKeyboard(){document.addEventListener('keydown',e=>{
  const tag=(e.target.tagName||'').toLowerCase();if(tag==='input'||tag==='select'||tag==='textarea')return;
  if(e.code==='Space'){e.preventDefault();ensureAudio();if(engine.state==='STOPPED')engine.play();else engine.stop();updateTransportUI();return;}
  const inDev=$('#devPane').classList.contains('on');
  if(e.ctrlKey||e.metaKey){const k=e.key.toLowerCase();
    // device shortcuts
    if(inDev){
      // paste to all tracks + master (works with or without selection)
      if(k==='v'&&e.shiftKey&&App.devClipboard){e.preventDefault();
        App.tracks.forEach(t=>{const d=t.addDevice(App.devClipboard.type);if(!d)return;
          d.enabled=App.devClipboard.enabled;

  if(endBeat<=0){toast('Timeline empty — drop a sample first');return;}
  toast('Rendering…');
  const sr=engine.ctx.sampleRate,spb=60/engine.bpm,dur=endBeat*spb+3;
  const off=new OfflineAudioContext(2,Math.ceil(dur*sr),sr);
  try{await eqxEnsureWorklet(off);}catch(e){console.warn('[EQ8] offline worklet failed — fallback DSP for export:',e&&e.message||e);}
  const master=off.createGain();master.gain.value=engine.master.gain.value;
  // master device chain (matching rebuildMasterChain)
  const masterInput=off.createGain();
  let mNode=masterInput;
  App.masterDevices.forEach(dev=>{if(!dev.enabled)return;const d=deviceOffline(off,dev);
    mNode.connect(d.input);mNode=d.output;});
  mNode.connect(master);master.connect(off.destination);
  const rA=off.createGain(),rev=off.createConvolver();rev.buffer=makeImpulse(off,2.4);
  const rAW=off.createGain();rAW.gain.value=0.9;rA.connect(rev).connect(rAW).connect(master);
  const rB=off.createGain(),dl=off.createDelay(2);dl.delayTime.value=spb*0.75;
  const fb=off.createGain();fb.gain.value=0.4;const dW=off.createGain();dW.gain.value=0.9;
  rB.connect(dl);dl.connect(fb).connect(dl);dl.connect(dW).connect(master);
  App.tracks.forEach(tk=>{if(!tk.clips.length)return;
    const oin=off.createGain(),vol=off.createGain(),onG=off.createGain(),pan=off.createStereoPanner();
    const A=tk.automation||{},b2s=b=>Math.max(0,b*spb);
    const volEnv=A['mixer.volume'],panEnv=A['mixer.pan'],onEnv=A['mixer.on'];
    const schedEnv=(param,env,map)=>{param.setValueAtTime(map(env[0].value),0);
      for(let i=0;i<env.length;i++){const p=env[i];
        if(i===0){param.setValueAtTime(map(p.value),b2s(p.beat));continue;}
        const a=env[i-1],t0=b2s(a.beat),t1=Math.max(b2s(a.beat)+1e-4,b2s(p.beat)),c=a.curve||0;
        if(!c){param.linearRampToValueAtTime(map(p.value),t1);}
        else{const N=24,pw=Math.pow(2,-c*4);for(let s=1;s<=N;s++){const tt=s/N,sh=Math.pow(tt,pw);
          param.linearRampToValueAtTime(map(a.value+(p.value-a.value)*sh),t0+(t1-t0)*tt);}}}};
    if(tk.mute){vol.gain.value=0;}
    else if(volEnv&&volEnv.length){schedEnv(vol.gain,volEnv,v=>Math.max(0.0001,v));}
    else vol.gain.value=tk.volume;
    if(onEnv&&onEnv.length){onG.gain.setValueAtTime(onEnv[0].value>=0.5?1:0,0);
      onEnv.forEach(p=>onG.gain.setValueAtTime(p.value>=0.5?1:0,b2s(p.beat)));}
    else onG.gain.value=tk.enabled?1:0;
    if(panEnv&&panEnv.length){schedEnv(pan.pan,panEnv,v=>clamp(v,-1,1));}
    else pan.pan.value=tk.pan;
    let node=oin;tk.devices.forEach(dev=>{if(!dev.enabled)return;const d=deviceOffline(off,dev);
      node.connect(d.input);node=d.output;});
    node.connect(vol).connect(onG).connect(pan).connect(masterInput);
    const sa=off.createGain();sa.gain.value=tk.sendA.gain.value;pan.connect(sa).connect(rA);
    const sb=off.createGain();sb.gain.value=tk.sendB.gain.value;pan.connect(sb).connect(rB);
    tk.clips.forEach(c=>{const buf=c.reverse?reversedBuffer(c.buffer):c.buffer;if(!buf)return;
      const clipFade=off.createGain();clipFade.gain.value=1;
      const mkSrc=()=>{const s=off.createBufferSource();s.buffer=buf;
        const g=off.createGain();g.gain.value=c.gain||1;s.connect(g).connect(clipFade).connect(oin);return s;};
      const bufOff=c.start*buf.duration;
      const spanSec=Math.max(0.001,(c.end-c.start)*buf.duration);
      const origLenBeats=c.origLenBeats||c.length;
      const loopExt=!!c.loopEnabledExt;
      const visDurBeats=loopExt&&c.visualDurExt?(c.visualDurExt/spb):c.length;
      const clipStartSec=c.startBeat*spb;
      const clipDurSec=visDurBeats*spb;
      const fi=c.fadeIn||0,fo=c.fadeOut||0,fcIn=c.fadeInCurve||0,fcOut=c.fadeOutCurve||0;
      const schedFadeIn=()=>{if(fi<=0)return;
        const t1=clipStartSec+fi*spb;clipFade.gain.setValueAtTime(0,clipStartSec);
        if(fcIn===0)clipFade.gain.linearRampToValueAtTime(1,t1);
        else{const n=32,vals=new Float32Array(n);for(let i=0;i<n;i++){const t=i/(n-1);vals[i]=fcIn>0?Math.pow(t,1+fcIn*3):Math.pow(t,1/(1-fcIn*3));}clipFade.gain.setValueCurveAtTime(vals,clipStartSec,fi*spb);}};
      const schedFadeOut=endTime=>{if(fo<=0)return;
        const t0=endTime-fo*spb;clipFade.gain.setValueAtTime(1,t0);
        if(fcOut===0)clipFade.gain.linearRampToValueAtTime(0,endTime);
        else{const n=32,vals=new Float32Array(n);for(let i=0;i<n;i++){const t=i/(n-1);vals[i]=fcOut>0?1-Math.pow(t,1+fcOut*3):1-Math.pow(t,1/(1-fcOut*3));}clipFade.gain.setValueCurveAtTime(vals,t0,fo*spb);}};
      // stretch mode
      if(c.stretch?.enabled&&stretchReady){
        schedFadeIn();schedFadeOut(clipStartSec+clipDurSec);
        const sRate=spanSec/Math.max(0.001,c.length*spb);
        const src=mkSrc();src.playbackRate.value=sRate;
        if(loopExt&&visDurBeats>origLenBeats&&c.loopLenExt>0){
          const ls=Math.max(0,Math.min(c.loopStartExt||0,buf.duration));
          const le=Math.min(ls+c.loopLenExt,buf.duration);
          if(le>ls+0.001){src.loop=true;src.loopStart=ls;src.loopEnd=le;}
        }
        try{src.start(clipStartSec,bufOff,clipDurSec);}catch(e){}
        return;
      }
      // varispeed (no stretch)
      let rate=Math.pow(2,(c.pitch||0)/12);
      // extension loop (seconds-based)
      if(loopExt&&visDurBeats>origLenBeats&&c.loopLenExt>0){
        schedFadeIn();schedFadeOut(clipStartSec+clipDurSec);
        const ls=Math.max(0,Math.min(c.loopStartExt||0,buf.duration));
        const le=Math.min(ls+c.loopLenExt,buf.duration);
        if(le>ls+0.001){
          const src=mkSrc();src.playbackRate.value=rate;
          src.loop=true;src.loopStart=ls;src.loopEnd=le;
          try{src.start(clipStartSec,bufOff,clipDurSec);}catch(e){try{src.start(clipStartSec);}catch(e2){}}
          return;
        }
      }
      // beat-based loop
      if(c.loopOn&&c.loopEnd>c.loopStart){
        schedFadeIn();schedFadeOut(clipStartSec+clipDurSec);
        const _bb=ceBufBeats(c);
        const lss=clamp(c.loopStart/_bb,0,1)*buf.duration;
        const les=clamp(c.loopEnd/_bb,0,1)*buf.duration;
        if(les>lss+0.001){
          const src=mkSrc();src.playbackRate.value=rate;
          src.loop=true;src.loopStart=lss;src.loopEnd=les;
          let loopOff=bufOff;
          if(loopOff<lss||loopOff>=les){const loopSec=les-lss;loopOff=lss+((loopOff-lss)%loopSec);}
          try{src.start(clipStartSec,loopOff,clipDurSec);}catch(e){try{src.start(clipStartSec);}catch(e2){}}
          return;
        }
      }
      // normal playback
      const src=mkSrc();src.playbackRate.value=rate;
      const bufPlay=Math.min(spanSec/rate,c.length*spb);
      schedFadeIn();schedFadeOut(clipStartSec+bufPlay);
      try{src.start(clipStartSec,bufOff,bufPlay);}catch(e){try{src.start(clipStartSec);}catch(e2){}}
      });});
  try{const rendered=await off.startRendering();
    saveAs(audioBufferToWav(rendered),(App.projectName||'master').replace(/\s+/g,'_')+'_master.wav');toast('Exported WAV');}
  catch(err){toast('Export failed: '+err.message);}}

/* =======================================================================
   INIT
   ======================================================================= */
function init(){const bh=clamp(window.innerHeight-752,80,600);$('#bottom').style.height=bh+'px';
  engine.init();App.snapStep=1;createTracks(6);
  setupArr();buildBrowser();buildStrips();
  wireTransport();wireKeyboard();
  if(App.narrowMode)$('#quantSel').value='narrow';
  $('#bpmDisplay').textContent=engine.bpm.toFixed(2);
  selectTrack(0);showDevices(0);updateTransportUI();renderLoop();wireMappingClicks();
  requestAnimationFrame(()=>{drawArr();drawTimeRuler();});
  window.addEventListener('resize',()=>{drawArr();drawTimeRuler();if($('#clipPane').classList.contains('on'))drawCE();syncStripsScroll();});
  // browser resize
  (()=>{const br=$('#browser'),rh=$('#browserResize');rh.addEventListener('pointerdown',e=>{e.preventDefault();
    const sx=e.clientX,sw=br.offsetWidth;
    const mv=ev=>{const w=clamp(sw+(ev.clientX-sx),100,500);br.style.width=w+'px';drawArr();drawTimeRuler();};
    document.addEventListener('pointermove',mv);document.addEventListener('pointerup',()=>{document.removeEventListener('pointermove',mv);},{once:true});});})();
  // bottom resize
  (()=>{const bt=$('#bottom'),rh=$('#bottomResize');rh.addEventListener('pointerdown',e=>{e.preventDefault();
    const sy=e.clientY,sh=bt.offsetHeight;
    const mv=ev=>{const h=clamp(sh+(sy-ev.clientY),80,600);bt.style.height=h+'px';
      drawArr();drawTimeRuler();if($('#clipPane').classList.contains('on'))drawCE();syncStripsScroll();};
    document.addEventListener('pointermove',mv);document.addEventListener('pointerup',()=>{document.removeEventListener('pointermove',mv);},{once:true});});})();
  toast('RAWDAW ready — drag a sample onto the timeline, drag devices onto tracks');}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();

</script>
  <script src="./native-hook.js"></script>
